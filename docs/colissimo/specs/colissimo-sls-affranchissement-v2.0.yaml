    ### Methods for generating documents
    
    
    A deposit slip (or sometimes called a proof of delivery) is a postal document which, once stamped and dated by the Post Office, certifies that your parcels have been taken in charge and traced for dispatch.
    
    
    It generally consists of a list of parcels. When you drop off your parcels at the post office or when they are collected by the carrier, the agent will scan the document, stamp it with the date stamp and give it to you as proof that it has been properly taken in charge.
    
    
    There are several ways of printing this document:
    
    
    Either using your own resources, based on the template detailed in the detailed template section of the slip 
    Or via the Web Service operations described below
    
    
    
