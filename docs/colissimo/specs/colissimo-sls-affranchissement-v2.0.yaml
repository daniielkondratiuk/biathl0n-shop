          description: "Prerequisite: you must have activated the \"Code\            \ Bloquant\" service on the Colissimo Box.<br/><br/>Indicates whether\            \ delivery should be made without a blocking code (if no value is entered,\            \ eligible parcels will be delivered with a blocking code).<br/><br/>1\            \ = true: Deactivates the blocking code<br/>0 = False: Does not deactivate\            \ the blocking code<br/>Empty = False: Does not deactivate the blocking\            \ code"
        hazmatFlag:
