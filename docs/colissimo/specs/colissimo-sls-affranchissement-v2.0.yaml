    ## DDP Overseas and International
    
    Colissimo offers its shipper customers the DDP offer which allows it to pay customs duties in case of taxation of parcels sent internationally and overseas.
    
    Management rules of DDP international
    
     * Fill in the flag " ddp " to " true " or 1 at the WS SLS entrance
    
     * The country of destination and the product must be eligible for the DDP offer (available in Colissimo website) otherwise the WS SLS will return error 30328. es to the United States of America and Canada. A consistency check between the postal code and the state or province code is performed by FEDEX. If there is no consistency, the WS SLS will return error message 30224
    
     * The code of the state or province of the recipient is mandatory for packag
    
     * Fill in the package dimensions correctly (length, width, height). They are mandatory otherwise the WS SLS will return errors 30329, 30330, 30331, 30332 30333, 30334 or 30335
    
     * Inform the recipient phone number, otherwise the WS SLS will return error 30220
    
     * Fill in the generic description of the items (param CustomsDeclarations->description). The text must be in English. It is mandatory otherwise the WS SLS will return the error 30557
    
    Management rules of DDP overseas (formerly Free of taxes and duty option)
    
     * Fill in the flag "ftd" to "true" or 1 at the WS SLS entrance
    
     * Available for Guadeloupe, Martinique, Mayotte, Réunion et Guyane (OM1 area, excluding Saint-Pierre-et-Miquelon and Mayotte)
    
     * No FTD option for Consumer OnLine products
    
     * Compatible with CDS code
    
    
        
        
    
