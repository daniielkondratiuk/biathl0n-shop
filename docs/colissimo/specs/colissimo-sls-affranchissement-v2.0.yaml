    ## Coding of formats
    
    
    
    
    <table>
    <tbody>
    
    <tr>
    <td valign="top"><p><strong>Code</strong></p></td>
    <td valign="top"><p><strong>Description</strong></p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>A</strong></p></td>
    <td valign="top"><p>Alphabetical characters (no space or punctuation)</p></td>
    </tr>

    <tr>
    <td valign="top"><p><strong>AN</strong></p></td>
    <td valign="top"><p>Any printable character</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>N</strong></p></td>
    <td valign="top"><p>Numerical decimal characters from 0 to 9</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>D</strong></p></td>
    <td valign="top"><p>Date</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>T</strong></p></td>
    <td valign="top"><p>Time</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>SUB</strong></p></td>
    <td valign="top"><p>Block: list of tags</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>L</strong></p></td>
    <td valign="top"><p>Choice from among a list of values</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>B</strong></p></td>
    <td valign="top"><p>Boolean (true/false; 1/0)</p></td>
    </tr>
    
    </tbody>
    </table>
    <p>&nbsp;</p>
    
    
    The numbers after these codes in the data description indicate the length of the field. A single number indicates a set length field (e.g. "N6" for 6-character numeric), two numbers separated by two full stops indicating the minimum and maximum length (e.g. "AN0..35" for alphanumeric that can be blank and up to a maximum of 35 characters).
    
    
    
    
    
    ## Coding of conditions
    
    
    
    
    <table>
    <tbody>
    
    <tr>
    <td valign="top"><p><strong>Code</strong></p></td>
