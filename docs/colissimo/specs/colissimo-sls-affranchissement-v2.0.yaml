    Where the SOAP request does not respect the xsd defined in the wsdl, the Framework axis returns an error in the response:
    
    
    
    <b>Case 1: Invalid date</b>
    
    
            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
                <soap:Body> 
                    <soap:Fault>
                        <faultcode>soap:Client</faultcode>
                        <faultstring>Unmarshalling Error: 2x015-03/23</faultstring>
                    </soap:Fault>
                </soap:Body>
            </soap:Envelope> 
    
    
    <b>Case 2: Invalid boolean</b>
    
    
    
            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
               <soap:Body>
                  <soap:Fault>
                     <faultcode>soap:Client</faultcode>
                     <faultstring>Unmarshalling Error: cvc-datatype-valid.1.2.1: 'eeee' is not a valid value for 'boolean'.</faultstring>
                  </soap:Fault>
               </soap:Body>
            </soap:Envelope> 


    <b>Case 3: Mandatory information not supplied</b>
    
    
    
            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
               <soap:Body>
                  <soap:Fault>
                     <faultcode>soap:Client</faultcode>
                     <faultstring>Unmarshalling Error: cvc-complex-type.2.4.a: Invalid content was found starting with element 'city'. One of '{zipCode}' is expected.</faultstring>
                  </soap:Fault>
               </soap:Body>
            </soap:Envelope>
    
    
    
    # Additional information
    
    
    ## Parcel Numbering Management
    
    
    The parcel number is defined by Colissimo and works on a range system.
    Any range of parcels allocated to a given product code:


    * has a lifespan of approximately 1½ years,


    * is automatically reset after the last package number.


    It means that:


    -	For any customer, for a given product code and a range of package numbers, if a web service call uses the last number in the range, the next call will automatically use the first package number in the same range,


    Example:


    For a range 6A from number 00000001 to number 99999999,


    If, for a type 6A package, during a first call, the customer's web service generates a package 6A99999999,


    So, for a parcel type 6A, during the next call, the customer's web service will generate a parcel 6A00000001


    -	Our customers must take into account the above management rule in their internal databases so that the track records of their packages are not confused.


    To help them in their logistics, we suggest our customers to add an order reference number associated with their package with the \<orderNumber\> tag of the \<service\> block that they will find in their tracking (in particular with the EDI-Tracking flow).





    ## Country codes and postal codes


    Country codes and postal codes must comply with international standards to ensure proper parcel routing. A consistency check is performed between the postal code and state/province code. In case of inconsistency, the WS will return error 30224.


    ### Country code (balise countryCode)



     * Country codes must comply with ISO 3166 standard: <a href="https://www.iso.org/obp/ui#search>"Online Browsing Platform (OBP)</a>

     * For special territories connected to other countries:

         ** Use the special territory code and not the code of the country it is connected to

         ** Example: "GL" for Greenland (connected to Denmark) and not "DK"


    ### Postal code (balise zipCode)



     * Format validity is checked according to the destination country

     * Example: a Canadian postal code must contain 6 characters

     * For CEDEX postal codes, the complete address is mandatory

     * To know international postal code formats, use the checkInterPostalCode method


    ### State/Province code (balise stateOrProvinceCode)


    Some countries require a mandatory state/province code to complete the address (United States, Canada, other countries according to regulations). Required for the United States.

    
    # Detailed deposit slip template:
    

    The delivery slip is only mandatory for destinations requiring a CN 23 customs declaration.
  
  
    Customers have several options for editing this document:
  
    * Via their own means based on the model provided in this document.
    
    * Via the Back-Office, if the option was requested from your sales representative (only for certain products).
  
    * Via the Web Service operations described in this document


