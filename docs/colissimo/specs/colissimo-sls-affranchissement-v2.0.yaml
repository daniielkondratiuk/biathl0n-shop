  /planPickup:
    post:
      tags:
      - "Description and examples of WS SLS methods"
      summary: planPickup
      description: "The method <b>planPickup ()</b> allows you to make a\        \ request for picking up a return parcel deposited by the sender in their\        \ mailbox. The parcel needs to have been previously announced with La Poste.\        \ This method will be used to confirm firmly the pick-up on the chosen date,\        \ after first announcing the shipment by means of the method GenerateLabel.\        \ This method is compatible with product code CORE (8R Colissimo Retour France)\        \ and CORF (CQ Colissimo Retour International)"
      operationId: planPickup_1
      parameters:
      - name: apiKey
        in: header
        description: apiKey 
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/definitions/PlanPickupRequest"
      responses:
        "200":
          description: Traitement OK
          content:
            application/json:
              schema:
                $ref: "#/definitions/PlanPickupResponse"
definitions:
  
    Address:
      required:
      - countryCode
      - zipCode
      type: object
      properties:
        companyName:
          type: string
          description: "<i>AN35</i> <br/>  companyName <br/><br/>For return\            \ postage (product code CORE 8R, CORI 7R or 5R), the company name is mandatory\            \ for the recipient."
        lastName:
          type: string
          description: <i>A1...35</i> <br/>  Last name.<br/>Mandatory to            send a parcel unless zipcode is a cedex Code
        firstName:
          type: string
          description: <i>A1...29</i> <br/>  First name.<br/>Mandatory for            out-of-home delivery (product code HD)
        line0:
          type: string
          description: "<i>AN1...35</i> <br/>  Floor, hallway, stairs, apartment.<br/><br/><b>Important:\            \ this line does not appear on labels being sent to Switzerland.</b>"
        line1:
          type: string
          description: "<i>AN1...35</i> <br/>  Entrance, bulding, residence.<br/><br/><b>Important:\            \ this line does not appear on labels being sent to Switzerland.</b>"
        line2:
          type: string
          description: "<i>AN1...35</i> <br/>  Number and route label.<br/><br/>Example:\            \ « 5 rue du Bellay »<br/><br/>must contain at least one character"
        line3:
          type: string
          description: "<i>AN1...35</i> <br/>  Place said or other mention.<br/><br/><b>Important:\            \ this line does not appear on labels being sent to Switzerland.</b>"
        countryCode:
          type: string
          description: "<i>A2</i> <br/>  ISO country code on 2 letters.<br/>Example:\            \ « FR » for France"
        city:
          type: string
          description: "<i>AN1...35</i> <br/>  Town.<br/><br/>Can be left\            \ blank (or else filled in by a chain of some sort, possibly not adequate)\            \ if the tag zipCode is filled with a Cedex code. *"
        zipCode:
          type: string
          description: "<i>AN5</i> <br/>  Postal code.<br/>If the postcode\            \ matches a Cedex code then:<br/><ul><li>the tag line2 can be left blank,</li><li>the\            \ tag city can be left blank.</li></ul>"
        phoneNumber:
          type: string
          description: <i>AN10...12</i> <br/> Phone Number.
        mobileNumber:
          type: string
          description: "<i>AN</i> <br/> The cell phone number is strongly\            \ recommended to improve the chances of delivery to the recipient (it\            \ is used to send tracking notifications by SMS).<br/>Checks performed\            \ :<ul><li>15 characters maximum</li><li>For Belgium parcel, the format\            \ must be exactly : +324NNNNNNNN</li></ul>It must be filled in for the\            \ following packages :<ul><li>Domestic out-of-home parcels (productCode=HD)</li><li>Parcels\            \ with DDP option</li><li>Parcels to the US</li></ul><br/><br/>For any\            \ international shipment, it is necessary to use the telephone prefix\            \ specific to the country in which your recipient is located.<br/><br/>The\            \ digits of the number must not follow an incremental sequence (e.g.,\            \ 123456789), otherwise the WebService will return an error."
        doorCode1:
          type: string
          description: <i>AN1...8</i> <br/>  Door code 1.<br/>Doesn’t appear            on the CN23 document.
        doorCode2:
          type: string
          description: <i>AN1...8</i> <br/>  Door code 2.<br/>Doesn’t appear            on the CN23 document.
        intercom:
          type: string
          description: <i>AN1...30</i> <br/>  Interphone.<br/><br/>Doesn’t            appear on the CN23 document.
        email:
          type: string
          description: "<i>AN5...80</i> <br/>  Mandatory if the tag productCode\            \ is <b>HD</b>.<br/><br/>Email Address.<br/>Used for follow-up notifications\            \ to the sender.<br/>Expected form: Text@Text.Text."
        language:
          type: string
          description: "<i>A2</i> <br/>  By default, the local language\            \ of the sending country.<br/>Language of the notification e-mail to the\            \ sender.<br/>Used for tracking notifications by email or SMS.<br/>The\            \ information is transmitted to local partners who can exploit it or not."
        stateOrProvinceCode:
          type: string
          description: <i>AN2</i> <br/>  State or province code. Required            for the United States.
      description: <i>SUB</i> <br/>  
    Addressee:
      required:
      - address
      type: object
      properties:
        addresseeParcelRef:
          type: string
          description: <i>AN1...15</i> <br/>  Recipient order reference.<br/><b>It            allows the destination reference to be displayed only on the label. This            data is not reflected in the Colissimo IT System and will not be visible            in OSC. Its size must not exceed 15. </b>
        codeBarForReference:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Used for Colissimo\            \ Retour only (tag productCode is <b>CORE</b>).<br/>Allows to indicate\            \ (or not) the reference of the order of the recipient in the form of\            \ a bar code on the label of the package.<br/>Enter \"true\" (or \"1\"\            ) to show the value of the tag addresseeParcelRef as a barcode on the\            \ parcel label."
        serviceInfo:
          type: string
          description: "<i>AN</i> <br/>  Used for Colissimo Retour only\            \ (tag productCode is <b>CORE</b>).<br/>Name of the department in the\            \ company.<br/>Example: \"Returns department\"."
        promotionCode:
          type: string
          description: <i>AN</i> <br/>  Not used (La Poste internal use            only)
        address:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  
    Article:
      required:
      - description
      - quantity
      - value
      - weight
      type: object
      properties:
        description:
          type: string
          description: <i>AN1…64</i> <br/>  Detailed description of the            article. Appears on CN23 document.<br/>Must be in English for the US and            for shipments with the DDP option.
        quantity:
          type: integer
          description: <i>N</i> <br/>  Number of articles of this type.            Appears on CN23 document.
          format: int32
        weight:
          type: number
          description: <i>N</i> <br/>  Unitary net weight of the articles            in kg. Appears on CN23 document.
          format: float
        value:
          type: number
          description: <i>N</i> <br/>  Unitary value of articles in EUROS.<br/>Appears            on CN23 document.
          format: float
        hsCode:
          type: string
          description: "<i>N6, N8 ou N10</i> <br/>  Mandatory if is 3 (commercial\            \ shipment). <br/>Mandatory for 7R and 5R return products. Then its size\            \ must be 6 or 11.<br/><br/>Tariff number corresponding to the article.\            \ It will be necessary to indicate 6, 8 or 10 digits for the international\            \ shipments requiring a customs declaration. <br/><br/>Appears on CN23\            \ document."
        originCountry:
          type: string
          description: "<i>A2</i> <br/>  ISO code of the country of origin\            \ of the article. <br/><br/> Mandatory for 7R and 5R return products.\            \ It must be identical for all declared articles.<br/><br/> Mandatory\            \ if category = 3 (commercial shipment). <br/><br/>Country name appears\            \ on CN23 document. <br/><br/> If filled in, check that the country code\            \ is A2 otherwise set FR by default. <br/>If the country code is different\            \ from the format A2, the WS sls will return an error."
        originCountryLabel:
          type: string
          description: Label
        currency:
          type: string
          description: "<i>AN3</i> <br/>  Set EUR by default if empty<br/><br/>Mandatory\            \ for 7R and 5R return products.<br/><br/>The currency must be the same\            \ for all declared articles. It must belong to the list {USD, EUR, CHF,\            \ GBP, CNY, JPY, CAD, AUD}. If the currency is different from the list\            \ above, the Web Service will return an error.|"
        artref:
          type: string
          description: "<i>AN1...35</i> <br/>  Mandatory for 7R and 5R return\            \ products.<br/><br/>Article reference, serial number."
        originalIdent:
          type: string
          description: "<i>A1</i> <br/>  Mandatory for 7R and 5R return\            \ products. <br/><br/>Key for identifying the outgoing invoice and the\            \ parcel related to the article.<br/><br/>Link up the parcel number with\            \ its sequencing: <br/><ul><li>if the article belongs to the 1st parcel,\            \ indicate A; </li><li>If the article belongs to the 3rd parcel, indicate\            \ C;</li><li>etc</li></ul>"
        vatAmount:
          type: number
          description: <i>N</i> <br/>  VAT on items
          format: float
        customsFees:
          type: number
          description: <i>N</i> <br/>  Customs duties on items
          format: float
      description: <i>SUB</i> <br/>  The block can be repeated up to 100        times.
    Category:
      type: object
      properties:
        value:
          type: integer
          description: <i>N1</i> <br/>  Mandatory for products subject to            a CN23 form.<br/>Type of shipment.
          format: int32
      description: <i>SUB</i> <br/>  Mandatory for products subject to a        CN23 form. <br/><br/>Block containing the tag related to the nature of the        shipment.
    CheckGenerateLabelRequest:
      required:
      - letter
      type: object
      properties:
        contractNumber:
          type: string
          description: <i>AN</i> <br/>  Deprecated. Use apikey instead as            explained in "Acess to the Web Service SLS/API Authentication".
        password:
          type: string
          description: <i>AN</i> <br/>  Deprecated. Use apikey instead as            explained in "Acess to the Web Service SLS/API Authentication".
        letter:
          $ref: "#/definitions/Letter"
        outputFormat:
          $ref: "#/definitions/OutputFormat"
        fields:
          $ref: "#/definitions/Fields"
        customizationFields:
          $ref: "#/definitions/CustomizationFields"
    Contents:
      type: object
      properties:
        article:
          type: array
          description: <i>SUB</i> <br/>  The block can be repeated up to            100 times.
          items:
            $ref: "#/definitions/Article"
        category:
          $ref: "#/definitions/Category"
        original:
          type: array
          description: <i>SUB</i> <br/>  
          items:
            $ref: "#/definitions/Original"
        explanations:
          type: string
          description: <i>AN1…35</i> <br/>  
      description: This block represents the type of shipment and list of        articles to declare.<br/>Mandatory if articles are eligible for the CN23 form.
    CustomizationField:
      type: object
      properties:
        type:
          type: string
        x:
          type: integer
          format: int32
        "y":
          type: integer
          format: int32
        taille:
          type: string
        value:
          type: string
    CustomizationFields:
      type: object
      properties:
        reference:
          type: array
          items:
            $ref: "#/definitions/CustomizationTemplate"
        customizationField:
          type: array
          items:
            $ref: "#/definitions/CustomizationField"
      description: <i>SUB</i> <br/>  
      xml:
        name: customizationFields
    CustomizationTemplate:
      type: object
      properties:
        customizableReferenceKey:
          type: integer
          format: int32
        customizableReferenceValue:
          type: string
    CustomsDeclarations:
      type: object
      properties:
        includeCustomsDeclarations:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Allows to include,\            \ in the response of the web service, the generation of a CN23 document\            \ in PDF format, relating to the articles declared in the web service\            \ request.<br/><br/>The CN23 document:<br/><ul><li>Is included by default\            \ in the web service response (the tag is \"true\" -or \"1\"),</li><li>Is\            \ not generated if the value of the tag is \"false\" (or \"0\")</li></ul>\            \  <br/> \"includeCustomsDeclarations = 1\" tag is mandatory for shipments\            \ eligible for dematerialization of customs documents (DDP option or DOM\            \ TOM shipment)."
        numberOfCopies:
          type: integer
          description: "<i>N</i> <br/>  Number of CN23 to print<br/>If the\            \ tag is not filled in, 4 copies of CN23 will be printed.<br/>The number\            \ goes from 1 included to 4 copies max. <br/> Note: international returns\            \ do not take into account the value entered here, due to their specific\            \ format."
          format: int32
        contents:
          $ref: "#/definitions/Contents"
        importersReference:
          type: string
          description: "<i>AN1…35</i> <br/>  Importer's reference, TVA number<br/>Appears\            \ on the CN23 document for shipments.<br/>Not used for returns."
        importersContact:
          type: string
          description: <i>AN35</i> <br/>  Importer's contact (tel./e-mail).<br/>Doesn’t            appear on CN23 document.
        officeOrigin:
          type: string
          description: <i>AN35</i> <br/>  Office origin.<br/>Doesn’t appear            on CN23 document.
        comments:
          type: string
          description: <i>AN35</i> <br/>  Observations<br/>Appears on CN23            document.
        description:
          type: string
          description: "<i>AN1.. ??</i> <br/>  Mandatory in the case of\            \ a DDP shipment<br/>Generic description of articles in English.<br/>Example:\            \ Textile items, Shoes, Music instrument, Hair dryer, etc."
        invoiceNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Identifier of related invoice            document.<br/>Appears in the « N° de la facture » field on the CN23 document.
        licenceNumber:
          type: string
          description: <i>AN1…35</i> <br/>  Identifier of the related import            license document.<br/>Appears in the « N° de la/les licences » field on            the CN23 document.
        certificatNumber:
          type: string
          description: <i>AN1…35</i> <br/>  Identifier of the related certificate            number document.<br/><br/>Appears in the « N° du/des certificats » field            on the CN23 document.
        importerAddress:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  These parameters are mandatory only        for destinations requiring a CN23 customs declaration.
    Field:
      required:
      - key
      - value
      type: object
      properties:
        key:
          type: string
          description: <i>A</i> <br/>  Key word to be informed
        value:
          type: string
          description: <i>AN32</i> <br/>  The expected value is the order            identifier in the SI Colissimo.
    Fields:
      type: object
      properties:
        field:
          type: array
          description: "Package size in centimeters: length, width and height<br/>\r\            \nLength <= 274 cm<br/>\r\nLength + circumference (2 x height + 2 x width)\            \ <= 330 cm<br/>\r\n               \r\n               <field>\r\n    \            \               <key>LENGTH</key>\r\n                   <value>30</value>\r\            \n               </field>\r\n               <field>\r\n              \            \     <key>WIDTH</key>\r\n                   <value>20</value>\r\n   \            \            </field>\r\n               <field>\r\n                  \            \ <key>HEIGHT</key>\r\n                   <value>10</value>\r\n      \            \         </field>\r\n               \r\n<b>Customer Barcode</b><br/>\r\            \nAdding a custom barcode in GEOLABEL standard labels cf. chapter \"Available\            \ Shipment options/Customer Barcode\" (maximum 17 alpha-numeric and 25\            \ numeric characters)<br/>\r\n               \r\n               <field>\r\            \n                      <key>PRINT_CUSTOMER_BARCODE</key>\r\n        \            \              <value>1</value>\r\n               </field>\r\n       \            \        <field>\r\n                       <key>CUSTOMER_BARCODE</key>\r\            \n                       <value>REF12345678</value>\r\n              \            \ </field>\r\n\r\nIF PRINT_CUSTOMER_BARCODE = 1, print the barcode with\            \ the value of the field CUSTOMER_BARCODE (see example of labels II.5.1.7)<br/>\r\            \nIF PRINT_CUSTOMER_BARCODE = 2, print the barcode with the value of the\            \ parcel number (see example of labels II.5.1.8)<br/>\r\n<br/>\r\n<br/>\r\            \n<b>Label with visible client tag</b><br/>\r\nOn standard GEOLABEL labels\            \ in 10x15 and PDF format, it is possible to add a customized 15 characters\            \ text below the label.<br/>\r\nThe PRINT_CUSTOMER_LABEL field allows\            \ the text to be displayed or not, and the CUSTOMER_LABEL field specifies\            \ the text.<br/>\r\n    \n             <field>\r\n                 <key>PRINT_CUSTOMER_LABEL</key>\r\            \n                 <value>1</value>\r\n             </field>\r\n    \n\            \    \n             <field>\r\n                 <key>CUSTOMER_LABEL</key>\r\            \n                 <value>ABCDEFG</value>\r\n             </field>\r\n\            \    \n<br/>\r\nNote: it is not possible to display a personalized barcode\            \ and a personalized text at the same time.<br/>\r\n<br/>\r\nNote 2: the\            \ personalized text will not appear on the label when reprinted by getlabel\            \ (or on a La Poste vending machine).<br/>\r\n<br/>\r\n<b>CN23 format</b><br/>\r\            \nAddition of a specific CN23 format :<br/>\r\n    \n             <field>\r\            \n                 <key>OUTPUT_PRINT_TYPE_CN23</key>\r\n             \            \    <value>ZPL_10x12_203dpi</value>\r\n             </field>\r\n    \n\            Format/value allowed :<br/>\r\nZPL_10x12_203dpi<br/>\r\nZPL_10x12_300dpi<br/>\r\            \nDPL_10x12_203dpi<br/>\r\nDPL_10x12_300dpi<br/>\r\nPDF_10x12_300dpi<br/>\r\            \nPDF_A4_300dpi<br/>\r\n<b>“Unique Label” (UL) including label and CN23\            \ on the same page </b> <br/>\r\naccepted formats are : <br/>\r\nZPL_10x15_203dpi_UL<br/>\r\            \nZPL_10x15_300dpi_UL<br/>\r\nDPL_10x15_203dpi_UL<br/>\r\nDPL_10x15_300dpi_UL<br/>\r\            \nPDF_10x15_300dpi_UL<br/>\r\nPDF_A4_300dpi_UL<br/>\r\n    \n        \            \     <field>\r\n                 <key>OUTPUT_PRINT_TYPE_CN23</key>\r\n\            \                 <value>PDF_10x15_300dpi_UL</value>\r\n             </field>\r\            \n    \nThe parcel (output_print_type_CN23) format and parcel format (outputprinting\            \ type) has to be the same in order to use the unique label feature :<br/>\r\            \nIf the parcel is not eligible for CN23, then the label format will be\            \ printed<br/>\r\n(OutputFormat block: outputprinting type field).<br/>\r\            \nIf more than 3 items are entered in the CN23 section, they will not\            \ be displayed in the item list, but included in the total value and weight.<br/>\r\            \nThis option overrides the customization features :<br/>\r\n- Add a customer\            \ label (PRINT_CUSTOMER_LABEL)<br/>\r\n- Adding a customer reference CAB\            \ (PRINT_CUSTOMER_BARCODE)<br/><br/>\r\n<b>Group your Parcel</b><br/>\r\            \n<br/>\r\n- The additional input parameters of the WS SLS for tracked\            \ parcels are as follows:<br/>\r\n•\tTracking parcel flag<br/>\r\n•\t\            Total number of packages<br/>\r\n•\tIteration (order number of the package)<br/>\r\            \n<br/>\r\n<br/>\r\n               <field>\r\n                  <key>TYPE_MULTI_PARCEL</key>\r\            \n                  <value>FOLLOWER</value>\r\n               </field>\r\            \n               <field>\r\n                  <key>PARCEL_ITERATION_NUMBER</key>\r\            \n                  <value>2</value>\r\n               </field>\r\n  \            \             <field>\r\n                  <key>TOTAL_NUMBER_PARCEL</key>\r\            \n                  <value>5</value>\r\n               </field>\r\n<br/>\r\            \n- The additional input parameters of the WS SLS for the master parcel\            \ are <br/>\r\n•\tMaster parcel flag<br/>\r\n•\tIteration (order number\            \ of the package)<br/>\r\n•\tTotal number of packages<br/>\r\nLimitation\            \ of 5 parcels in total<br/>\r\n•\tList of follow-up packages<br/>\r\n\            \     \r\n     \r\n              <field>\n                   <key>TYPE_MULTI_PARCEL</key>\r\            \n                   <value>MASTER</value>\r\n             </field>\r\n\            \             <field>\r\n                  <key>PARCEL_ITERATION_NUMBER</key>\r\            \n                   <value>2</value>\r\n             </field>\r\n   \            \          <field>\r\n                  <key>TOTAL_NUMBER_PARCEL</key>\r\            \n                   <value>5</value>\r\n             </field>\r\n   \            \          <field>\r\n                  <key>LIST_FOLLOWER_PARCEL</key>\r\            \n\t\t\t\t     <value>8Q53764663714/8Q53764663721/8Q53764663738/8Q53764663748/8Q53764663758</value>\r\            \n             </field>\r\n<br/>\r\n<b>BuyNowPayLater</b><br/>\r\nThis\            \ input is used to notify transaction id attached to a parcel as part\            \ of the Colissimo<br/>\r\npay offer for deferred and fractioned payment.<br/>\r\            \nThis id parameter is truncated at 50 characters<br/>\r\n    \n     \            \        <field>\r\n                 <key>BNPL</key>\r\n             \            \    <value>ID de transaction</value>\r\n             </field>\r\n   \            \ \n<b>CUSER_INFO_TEXT</b><br/>\r\nResearch label for OSC. The label can\            \ be unique or shared between multiple parcels in order to search for\            \ a list of parcels with the same reference, for example.<br/>\r\n   \            \ \n             <field>\r\n                 <key>CUSER_INFO_TEXT</key>\r\            \n                 <value>xxxxxxxxxxxxxxxxxx</value>\r\n             </field>\r\            \n    \n<b>CUSER_INFO_TEXT_4</b><br/>\r\nPartner reference (if given by\            \ your Colissimo contacts). Specific to the use of the service by our\            \ partners.<br/>\r\n    \n             <field>\r\n                 <key>CUSER_INFO_TEXT_4</key>\r\            \n                 <value>xxxxxxxxxxxxxxxxxx</value>\r\n             </field>\r\            \n    \n<br/>\r\n<b>EORI (Economics Operators Registration and Identification)</b><br/>\r\            \n<br/>EORI numbers of the sender and/or recipient, which will appear\            \ on the customs declaration.\r\n  * Use the 'EORI_ADDRESSEE' field for\            \ the recipient's EORI.\r\n    <br/>\n  * Use the 'EORI' field for the\            \ sender's EORI (mandatory for shipments to the US).\r\n    \n       \            \      <field>\n                <key>EORI</key>\n                <value>1234567</value>\n\            \             </field>\n             <field>\n                <key>EORI_ADRESSEE</key>\n\            \                <value>1234567</value>\n             </field>\n"
          items:
            $ref: "#/definitions/Field"
        customField:
          type: array
          items:
            $ref: "#/definitions/Field"
      description: <i>SUB</i> <br/>  
    Letter:
      required:
      - addressee
      - parcel
      - service
      type: object
      properties:
        service:
          $ref: "#/definitions/Service"
        parcel:
          $ref: "#/definitions/ParcelRequestV2"
        customsDeclarations:
          $ref: "#/definitions/CustomsDeclarations"
        sender:
          $ref: "#/definitions/Sender"
        addressee:
          $ref: "#/definitions/Addressee"
        codSenderAddress:
          $ref: "#/definitions/Address"
      description: "<i>SUB</i> <br/>  This block contains tags and blocks\        \ related to the shipment (options, parcel, sender, addressee, customs).<br/>List\        \ sub-bocks (described below): <br/><ul><li>Service: type of product and prices,\        \ </li><li>Parcel: insurances and options, </li><li>Sender: sender,</li><li>Addressee:\        \ addressee, </li><li>CustomsDeclarations: customs.</li></ul>"
    Original:
      type: object
      properties:
        originalIdent:
          type: string
          description: "<i>A1</i> <br/>  Mandatory for 7R and 5R return\            \ products. <br/><br/>Key for identifying the invoice and outgoing parcel\            \ related to the article.<br/>Link up the parcel number with its sequencing:\            \ <br/><ul><li>if the article belongs to the 1st parcel, indicate A;</li><li>If\            \ the article belongs to the 3rd parcel, indicate C; </li><li>etc.</li></ul>"
        originalInvoiceNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Mandatory for a return parcel.<br/><br/>Original            invoice number for a return parcel.
        originalInvoiceDate:
          type: string
          description: <i>AN10</i> <br/>  Mandatory for a return parcel.            <br/><br/>Original invoice date for a return parcel. YYYY-MM-DD format            is expected. The date must be before or the same as today’s date
          format: date-time
        originalParcelNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Mandatory for a return parcel.<br/><br/>Original            parcel number.
      description: Mandatory for 7R and 5R return products. <br/><br/>Block        containing Original data set(s).<br/>Up to 5 Original data sets are approved.        Packages are identified all together with the 5 Original sets
    OutputFormat:
      required:
      - outputPrintingType
      - x
      - "y"
      type: object
      properties:
        x:
          type: integer
          description: "<i>N-9999…9999</i> <br/> By default, enter \"false\"\            \ (or \"0\"). <br/>Allows horizontal adjustment of printing on the label\            \ (expressed in points): <br/><ul><li>if x < 0: the label is shifter to\            \ the right</li><li>if x > 0: the label is shifted to the left</li></ul>"
          format: int32
        "y":
          type: integer
          description: "<i>N-120…120</i> <br/> By default, enter \"false\"\            \ (or \"0\"). <br/>Allows vertical adjustment of printing on the label\            \ (expressed in points): <br/><ul><li>if y < 0: the label is shifter up</li><li>if\            \ y > 0: the label is shifted down</li></ul>"
          format: int32
        outputPrintingType:
          type: string
          description: <i>L</i> <br/> Label printing format.
        dematerialized:
          type: boolean
          description: <i>B</i> <br/> Not used (La Poste internal use only)
        returnType:
          type: string
          description: "<i>L</i> <br/> Used if the tag productCode is <b>CORE\            \ (8R)</b> or <b>CORF (CQ).</b><br/><br/>Defines the label transmission\            \ mode. By default, the label is sent in the Web Service response only.<br/>Possible\            \ values:<br/><ul><li>SendPDFByMail: the label is also sent by email,\            \ as an attachment, to the address indicated in the “sender block”.</li><li>SendPDFLinkByMail:\            \ the label is also sent by email, as a hypertext link, to the address\            \ indicated in the “sender block”.</li></ul>"
        printCODDocument:
          type: boolean
          description: "<i>B</i> <br/> Allow you to print the CRBT document\            \ <br/><br/> Default: false"
      description: <i>SUB</i> <br/>  This block contains the sub-tags linked        to the format of the data sent by the Web Service
    ParcelRequestV2:
      required:
      - weight
      type: object
      properties:
        parcelNumber:
          type: string
          description: <i>AN13</i> <br/>  Not used (La Poste internal use            only)
        insuranceAmount:
          type: integer
          description: <i>N</i> <br/>  Not used (La Poste internal use only)
          format: int32
        insuranceValue:
          type: integer
          description: "<i>N</i> <br/>  Insured value <br/><br/>  By default,\            \ enter \"0\".<br/><br/>If the insurance option is chosen, enter the amount\            \ of the desired insurance level by selecting among one of the 6 levels\            \ below . <br/> The amount must be written in cents. Example: 500000 for\            \ 5,000 EUR.<br/><br/> If the value entered does not match one of the\            \ 6 levels of insurance available, the value will be changed the level\            \ in which the entered amount is located. Example: 16200 for 162 EUR will\            \ become 30000 for 300 EUR. <br/><br/> 6 optional insurance levels: <br/>\            \ <ul> <li>150 EUR ; </li> <li>300 EUR ; </li> <li>500 EUR ; </li> <li>1000\            \ EUR ; </li> <li>2000 EUR ; </li> <li>5000 EUR ;</li></ul><br/>Maximum=\            \ 5000€."
          format: int32
        recommendationLevel:
          type: string
          description: Level
        weight:
          type: number
          description: "<i>N</i> <br/>  Weight of parcel in kg. <br/> Example:\            \ \"5.50\". <br/><br/> <b>parameter \"weight\":</b> <ul> <li>Parcel weight\            \ in kg,</li> <li>Minimum: 0.01kg,</li> <li>Maximum: 30.00 kg or the maximum\            \ weight authorised by the pick-up location</li> <li>Only 2 decimals different\            \ from 0 are accepted.</li> </ul> <br/> <b>The status of the customer\            \ account:</b> a terminated customer account will not allow labels to\            \ be generated. "
          format: float
        nonMachinable:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Parcel format.<br/>If\            \ productCode is <b>HD</b>, enter \"false\" (or \"0\") by default.<br/>Enter\            \ \"true\" (or \"1\") to indicate that parcel format is non-standard (non-machinable)."
        returnReceipt:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Advice of receipt"
        instructions:
          type: string
          description: "<i>AN1...35</i> <br/>  Additional information:<br/><ul><li>For\            \ the delivery labels,</li><li>For Colissimo Return labels (return pattern).</li></ul>Example\            \ for a delivery: \"to the left of interior gate\"."
        pickupLocationId:
          type: string
          description: "<i>N6</i> <br/>  Pick-up location identifier for\            \ Colissimo out of home delivery.<br/>This tag:<br/><ul><li>Must be entered\            \ if the tag productCode is <b>HD</b></li><li>Must be blank if the tag\            \ productCode is <b>DOM or DOS.</b></li></ul>If the network code is \"\            X00\", the block <fields> must be set."
        ftd:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>For overseas\            \ shipments <br/>Mandatory, to be filled in by \"true\" (or \"1\"), for\            \ shipments to Overseas France only."
        ddp:
          type: boolean
          description: "<i>B</i> <br/>  Default: false <br/>- For international\            \ shipments <br/>Indicate \"1\" if the package is ddp"
        disabledDeliveryBlockingCode:
          type: string
          description: "Prerequisite: you must have activated the \"Code\            \ Bloquant\" service on the Colissimo Box.<br/><br/>Indicates whether\            \ delivery should be made without a blocking code (if no value is entered,\            \ eligible parcels will be delivered with a blocking code).<br/><br/>1\            \ = true: Deactivates the blocking code<br/>0 = False: Does not deactivate\            \ the blocking code<br/>Empty = False: Does not deactivate the blocking\            \ code"
        cod:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Indicates whether\            \ delivery should be made on a reimbursable basis."
        codamount:
          type: integer
          description: "<i>N</i> <br/>  Default: false (or 0)<br/>Mandatory\            \ if the value of the tag COD is \"true\" (or \"1\").<br/>Amount expected\            \ for cash on delivery."
          format: int32
        codcurrency:
          type: string
          description: COD currency
      description: <i>SUB</i> <br/>  
    Sender:
      type: object
      properties:
        senderParcelRef:
          type: string
          description: <i>AN1...17</i> <br/>  Sender Order Number.<br/>It            displays the customer reference only on the label. This data is not reflected            in the Colissimo IT System and will not be visible in OSC.
        address:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  
    Service:
      required:
      - depositDate
      - productCode
      type: object
      properties:
        productCode:
          type: string
          description: "<i>L</i> <br/>  Code indicating the desired product.<br/>Example:\            \ code <b>CORE</b> for Colissimo Return.<br/>If the tag is:<br/><ul><li><b>HD</b>,\            \ the tag pickupLocationId must be entered,</li><li><b>DOM or DOS</b>,\            \ the tag pickupLocationId should not be entered.</li></ul>"
        depositDate:
          type: string
          description: "<i>D</i> <br/>  Scheduled deposit date in the La\            \ Poste network.Example: \"2022-06-25\"."
          format: date-time
        mailBoxPicking:
          type: boolean
          description: "<i>B</i> <br/>  Default: false<br/>Used if the tag\            \ <productCode> is <b>CORE (8R) or CORF (CQ).</b><br/><br/>Use if the\            \ former recipient of the parcel wishes to return it by placing it in\            \ his mailbox (offer “return mailbox”).<br/>Enter \"true\" (or \"1\")\            \ so that the parcel, returned by its former recipient, can be collected\            \ by a Colissimo agent from the mailbox of the former recipient."
        mailBoxPickingDate:
          type: string
          description: "<i>D</i> <br/>  Used if the tag <productCode> is\            \ <b>CORE (8R) or CORF (CQ).</b><br/>Mandatory only if mailBoxPicking\            \ is \"true\" (or \"1\").<br/>Date requested for picking up from the mailbox.<br/>Example:\            \ \"2022-06-25\".<br/>To find out the next available date, call the getListMailBoxPickingDates\            \ method.<br/>"
          format: date-time
        vatCode:
          type: integer
          description: <i>N</i> <br/>  Not used (La Poste internal use only)
          format: int32
        vatPercentage:
          type: integer
          description: <i>N</i> <br/>  Not used (La Poste internal use only)
          format: int32
        vatAmount:
          type: integer
          description: <i>N</i> <br/>  Not used (La Poste internal use only)
          format: int32
        transportationAmount:
          type: integer
          description: "<i>N</i> <br/>  Default: false<br/><br/>Basic shipping\            \ price (carriage costs) without any options. In euro cents.<br/><br/>Example:\            \ 4530 for 45.30€.<br/>Does not appear in the CN23 form.<br/>"
          format: int32
        totalAmount:
          type: integer
          description: "<i>N</i> <br/>  Mandatory for parcels requiring\            \ a CN23 declaration.<br/>Basic shipping price increased by the price\            \ of shipment options. In euro cents.<br/>Example: 4530 for 45.30€.<br/>\            \ Appears in the CN23 form in the \"Frais de port\" field."
          format: int32
        orderNumber:
          type: string
          description: <i>AN1…30</i> <br/>  Customer's order number.<br/>Does            not appear on the label but will be included in the Colissimo IT System.<br/>Returned            in tracking information.<br/>Can be useful for searching for parcels using            this field in the OSC tracking system (appears in the "réf. client." field).
        commercialName:
          type: string
          description: "<i>AN</i> <br/>  Commercial name of the shipper.<br/>The\            \ tag is:<br/><ul><li>Mandatory if tag <productCode> is <b>HD</b></li><li>Not\            \ mandatory if tag <productCode> is <b>DOM, DOS</b></li></ul>This name\            \ will be displayed in e-mail notifications sent to the parcel addressees."
        returnTypeChoice:
          type: integer
          description: "<i>L</i> <br/>  Indicates whether the parcel must\            \ be returned to the sender in case of non-delivery of the parcel.<br/>Mandatory\            \ for certain international parcels, according to the applicable tariff\            \ areas."
          format: int32
        reseauPostal:
          type: string
          description: "<i>B</i> <br/>  This parameter enables the possibility\            \ to choose the network responsible of the shipping (DPD or the local\            \ postal network), for international shipments.  <br/> <ul><li><b>reseauPostal\            \ = 0 => Select DPD network</b></li><li><b>reseauPostal = 1 => Select\            \ local postal network</b></li></ul>"
      description: <i>SUB</i> <br/>  
