    Generate a packing slip based on a list of parcel numbers.
    The maximum number of parcels in the request is currently 250.
    The document is only available in French
    </td>
    </tr>
    
    <tr>
    <td><a href="#tag/SlsServiceWS-:-documentation/operation/getBordereauByNumber">getBordereauByNumber</a> </td>
    <td>
    Reprint a slip using the number of the slip in question. The slip was previously generated using the
    generateBordereauxByParcelNumbers method     
    </td>
    </tr>
    
