    ## Example of Secure Return label with generateToken

    The generateToken method allows you to generate a secure code for your return shipments to provide to the customer, replacing a traditional label. This solution allows the label to be edited when deposited at the post office via the code provided on the PDF for a defined period.
    
    <div align="center">
      <img alt="Unique Label" src="../images/token.png" style="width:500px;" />
    </div>
    
    
    
    
    # Error codes
    
    
    
    These are possible values of the element <b>\<id\></b> present in the definition of the <b>\<message\></b> type. The cause of the error is described in the associated <b>\<libelle\></b> element.


    String type parameters whose length exceeds the authorised length will be truncated to the right. A warning message and a code will be added to the response's "Message" parameter.


    These messages are sent in French but their translation in English can be found in this chapter.
    
    
    
    
    
    
    
