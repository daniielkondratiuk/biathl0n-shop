    # Introduction
    
    ## Purpose of the document
    
    <i>La Poste - Colissimo</i> has made SLS, Simple Label Solution, available to its customers to produce their Shipping labels.
    
    This Web Service is used to create the documents associated with a parcel (labels and customs documents) as well as to send its electronic preadvice automatically to La Poste - Colissimo.
    
    
    This document describes access and the specific uses of the Web Service.
    
    The present technical documentation is the only reference document that may be used for this webservice.
    
    The customer accepts to ensure that its partners respect the use of the webservice. Should this not be the case, La Poste may automatically and immediately suspend access to the web service, in whole or in part, without prior notice.
    
    ## Pre-requisites
    
    Depending on the programming language and version, you may need to install additional libraries.
    
    
    If you use a thermal printer, you must also have knowledge of the system in order to be able to send the data flows from the web service to your printer's USB port or network.
    
    
    A customer interested in the Shipping Web Service must sign up for a solution in order to be given a Colissimo account (Colissimo does not provide test accounts).
    
    
    ## Scalability of Web Services

    Scalability of the Web Service Since the Web Service may undergo slight changes (e.g. increase in the number of output elements returned), La Poste - Colissimo recommends that flexible and dynamic programming logic is used.
    
    
    ## Managing accented and non-latin characters
    
    Characters must be UTF-8 encoded.
    
    
    In order to ensure correct reproduction on the labels and in the notification sent to addressees:
    
    
    * accented characters inputted into the Web Services are replaced by their equivalent characters without accents (e.g. "é" is replaced with "e"),
    
    * non-Latin characters will result in an error.
    
    
    
    ## Format and processing of the response from the Web Service
    
    
    The SLS web service uses the MTOM (Message Transmission Optimization Mechanism) technology. This means that the label is attached in MIME format to the web service's response.
    
    
    Depending on the programming language used, it may be necessary to parse the response to extract the attachments:
    
    * SOAP/XML+XOP,

    * REST/JSON+XOP.
    
    
    
    
    
    
    ## Test Labels
    
    All shippers can carry out Shipping label creation test without being invoiced; however, it is worth informing the sales contact beforehand.
    
    
    However, shippers will be invoiced for any label scanned during production. 
    
    
    We request for loading tests not to be carried out so as to avoid disrupting the services that we offer in relation to production.
    
    
    ## Security: recommendation of the HTTPS protocol
    
    
    The access to this Web Service is protected by an identifier and a password which are sensitive data, La Poste - Colissimo recommends you to use the HTTPS protocol with version TLS 1.2 at least for sending these data.
    
    Not using this protocol leaves the possibility that your user ID could be intercepted by a malicious third party. Having your user ID allows the malicious third party to:
    
    
    * Gain access to your corporate space (online invoice, parcel tracking),
    
    * Order products, invoiced to the account whose identity has been stolen,
    
    * Gain access to the other solutions made available by La Poste - Colissimo.
    
    
    The terms of use for this solution specify that the Customer undertakes to take all relevant measures to ensure the security and confidentiality of its identifier and password.
    
    
    The customer is deemed liable for all connections made using the Customer's user ID and password, access to the Web Service, the transmission of data and any other operations.
    
    
    ## Best development practices for API access
    
    <b>It is strongly recommended to use a library to retrieve the attachment in the response to api calls.</b> Technical fields that are not part of the interface (ex : content-type) are likely to evolve with the frameworks we use. For the same reason, we advise against reading the attachment directly from the raw response - for example, by reading the raw response from a certain position.
    
    * Do not use line numbers to interpret the response, especially when retrieving the attachment (line breaks can be added by the framework)

    * Do not parse the response, in particular to retrieve the attachment
    
    
    It is better not to send an optional field at all than to send it empty.
    
    
