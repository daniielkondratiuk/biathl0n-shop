    ## API authentication
    
    
    Authentication is required to access the various resources of our API. We use an authentication system based on Web Services application keys (tokens) to secure exchanges and guarantee user identity. These instructions apply to all the methods described in this documentation.
    
    
    <b>Obtaining the Web Services application key</b>
    
    
    To obtain a user key, you need to connect to the Cbox with your login details (username and password), then go to your profile. This key can be renewed at any time for security and confidentiality purposes.
    
    
    <b>Using the Web Services application key</b>
    
    
    Once you have obtained your connection key, you must include it in the header of all your requests.
    
    
    Example: 


    In the header


    	       apikey: 123A123BC1234D12345
    
    
    <b>Specific case of delegation on an advanced user : </b>
    
    
    For logisticians or marketplace, who have received a delegation on the SLS Web Service, you need to obtain the user key of the account for which you are going to frank. You will need to: 


    * Enter your own colissimo account in the fields
    
    
    * Enter the Web Services application key for the account for which you are franking In the header



    Example: 


    In the header


    	       apikey: 123A123BC1234D12345


    In fields
    
    
    	       <field>
                  <key>ACCOUNT_NUMBER</key>
                    <value>100102</value>
               </field>
    
    
    
    
    <b>Expiry and renewal of the Web Services application key</b>
    
    
    
    Authentication keys do not have a limited lifetime at the moment. It is your responsibility to update your key regularly via the Cbox.
    
    
    You can update your key by logging in to the Cbox with your login details (username and password), then go to your profile editing area and click on the "generate" button next to the "Web Services connection key" field.


    The update is effective immediately. Please note that if you change your Web Services application key in the customer area, you must also change it in the web service invocation, otherwise access to the web service will be denied.
    
    
    <b>Handling authentication errors</b>
    
    
    In the event of an authentication error, the API will return a status code 30000 with a message describing the nature of the error. Make sure you handle these errors correctly in your application to provide a good user experience.
    
    
    <b>Best practices</b>
    
    
    * Security: Only share your Web services application key when necessary. Treat it like a password.
    
    
    * Storage: Securely store tokens on the client (e.g. in secure client-side storage).
    
    
    * Renewal: Change your Web services application key on a regular basis.
    
    
    
    
    
    
    
    
    
