    </tr>
    
    <tr>
    <td valign="top"><p><strong>O</strong></p></td>
    <td valign="top"><p>Mandatory data. Data that should be systematically present in the file</p></td>
    </tr>
    
    <tr>
    <td valign="top"><p><strong>F</strong></p></td>
    <td valign="top"><p>Optional data. This information can be supplied if present in the information system issuing the file .</p></td>
    </tr>
    
    
    <tr>
    <td valign="top"><p><strong>C</strong></p></td>
    <td valign="top"><p>Presence conditioned by the content of another field in the same record. Example: a parcel for which a notification for the address is requested must indicate the relevant information to send the notification (telephone number and/or email address, as appropriate).</p></td>
    </tr>
    
    </tbody>
    </table>
