    ## The Geolabel label format
    
    
    
    Geolabel is La Poste Group's new common standard for labelling, routing and data exchange, to ensure optimum interoperability in parcel processing. The introduction of this single label will increase synergies between the Group's various entities, enabling us to respond more effectively to customer expectations. Thanks to the increased volume of information it contains, the Geolabel also provides a visual sorting aid, as well as being a more effective tool. Your labelling web service solution will generate Geolabel labels automatically and progressively, with no need for updates.
    
    
    Labels for foreign countries can sometimes be different to suit the readability by our delivery partners.
    
    
    
    
    
    ## Printed materials
    
    
    The La Poste - Colissimo Shipping Web Service allows you to choose the format of the labels you want to obtain in return for each call, by using the <b>"outputPrintingType"</b> input parameter which defines different format, dimension and resolution options.
    
    
    This parameter can take the following values:
    
    
