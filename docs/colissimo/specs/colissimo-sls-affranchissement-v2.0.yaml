    ## Colissimo Flash Offer
    
    
    Flash products which deliver to mainland France on D+1, are gradually being deployed in France.
    
    
    <b>Only certain postal codes are eligible for Colissimo “Flash” offer.</b>
    
    
    The eligibility of a delivery in D+1 is conditioned by:
    
    
    * the place of deposit of the parcel in the Colissimo network (in other words the PFC Platform Parcel) attached to the customer account number,
    
    * the postal code of the destination,
    
    * the deadline for filing the parcel in the Colissimo network.
    
    
    <b>The eligibility of the destination postal code</b> in the case of a delivery "Colissimo Flash" can be confirmed by one or the other of the following devices:
    
    
    * A webService of eligibility to the offers: This web-service, which will be described in third-party specifications.
    
    * An asynchronous EDI feed providing the eligible postal code file each time this file is updated, depending on the evolution of the offer's coverage.
    
    
    Otherwise, a list may be communicated by the client account manager.
    
    
    ## International shipments or shipments to Overseas France
    
    
    * <b>tag countryCode:</b>
    
    
    The country code provided in the tag <b>countryCode</b> must match one of those listed in the table of countries provided in a separate document.
    
    
    Examples:
    
    
    * for a shipment to China, it is necessary to indicate \<countryCode\>CN\</countryCode\> (SOAP),
    
    
    * for a shipment to Martinique, it is necessary to indicate \<countryCode\>MQ\</countryCode\> (SOAP).
    
    
    Important: for special territories connected to other countries, the value of the tag <b>\<countryCode\></b> must match that on the special territory and not that of the country to which it is connected.
    
    
    Example: "GL" needs to be provided for Greenland (connected to Denmark) and not "DK".
    
    
    * <b>tag zipCode:</b>
    
    
    The validity of the postcode format is checked for the country of destination (according to the country code transmitted in the tag <b>\<countryCode\></b>). For example, a verification will be made that a postcode transmitted to Canada contains 6 characters.
    
    
    * <b>tag returnTypeChoice:</b>
    
    
    Key designating the action to be performed in the event of a parcel return (for the Expert I or Colissimo International solutions).
    
    
    To know what options are allowed for a country, call the <a href="#tag/SlsServiceWS-:-documentation/operation/getProductInter"><b>method getProductInter</b></a>.
    
    
    More information on colissimo.fr .
    
    
