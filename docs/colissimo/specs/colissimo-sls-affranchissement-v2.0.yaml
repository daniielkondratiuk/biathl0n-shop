    * tag <b>value</b> :


    Displays the unitary value of articles in EUROS. (note that the total sum of the products must be greater than or equal to 1)


    * Only 2 decimals different from 0 are accepted.
    
    
    
    
    
    Where the data required for creating the CN23 are supplied to La Poste Colissimo, this document is returned to you in the response to the method <b>generateLabel</b>  (tag \<cn23\>), in 4 copies, in the form of a single PDF file (regardless of the print mode of the parcel label requested).


    * tag <b>"hsCode"</b>:


    In 1988, after several States in the world, the European Community adopted the Harmonized System (HS) for commodity description and coding. This "tariff number" (which can count 6, 8 or 10 digits) allows all physical objects uniquely and worldwide to be identified. It is one of the three elements used to establish the customs duties, alongside the carriage costs and the origin of the goods.


    To allow fast processing of customs operations on arrival in the country of destination, we thus recommend that companies indicate the tariff number of the good sent. For goods sent by post, only the indication of the 6-digit tariff number is an obligation for the forwarding agents. 


    <b>Where to obtain the tariff number?</b>


    * Contact the customs offices of your region for regular shipments.


    * Visit the French customs website: http://ec.europa.eu/taxation_customs/dds2/taric/taric_consultation.jsp?Lang=fr



    ## EORI (Economics Operators Registration and Identification)


    Any Community professional (EU) wishing to make shipments outside the EU, will have to submit an identification request to retrieve his EORI number. This unique community number aims at securing the incoming and outgoing trade of the EU.



    * Use the 'EORI_ADDRESSEE' field for the recipient's EORI
    
    * Use the 'EORI' field for the sender's EORI
    
    * The two EORI number will be displayed on the CN23


            <field>
            <key>EORI</key>
            <value>xxxxxxxxxxxxxxxxxx</value>
            </field>
    
    
    <div align="center">
      <img alt="Declaration with EORI" src="../images/Image15.png" style="width:800px;" />
    </div>
    
    
    
    
    ## GST (Australian tax identifier)


    Any trade professional wishing to trade to Australia will need to apply for identification to recover his GST registration. In this case, the exporting company to Australia will have to pay the GST that it owes directly to the Australian tax authorities.


            <field>
            <key>GST</key>
            <value>xxxxxxxxxxxxxxxxxx</value>
            </field> 
    
    <div align="center">
      <img alt="Declaration with the GST" src="../images/Image14.png" style="width:800px;" />
    </div>
    
    
    
    ## Offer “Colissimo Retour OM” (Oversea returns)
    
    
    La Poste - Colissimo opens the oversea countries for parcel returns, with:


    * the new traffic code "5R", thanks to the product code "CORI",


    * the already known traffic code "8R", thanks to the product code "CORE" 


    The web service allows the printing of the return label and the CN23.


    <b>Direction of authorized “Retour OM”</b>


    The offer “Retour OM” is only allowed in these directions:


    * Oversea to oversea for inter-oversea only,


    * Metropolitan France, Monaco and Andorra to overseas


    * Oversea to Metropolitan France, Monaco and Andorra.
    
    
    
