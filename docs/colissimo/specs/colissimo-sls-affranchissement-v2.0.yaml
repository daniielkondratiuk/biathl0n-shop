    ## Special Handling Flow


    *<i>Prerequisite, functionality only available in version 3.1 of the SLS Web Service</i>


    Colissimo offers a dedicated option for sending parcels containing hazardous materials, under a special handling flow. This feature is available to customers who have subscribed to the "special handling flow" option in their contract.

    With this option, you can:

    * Declare the presence of hazardous materials in a parcel via the Web Service  
    
    * Specify the category of the material according to regulatory standards  
    
    * Enable the printing of the "Hazardous Material" logo if needed  


    This declaration allows the Colissimo system to automatically apply specific processing rules: sorting, routing, billing, etc.




        <letter>
          <parcel>
            <!-- Special handling flow fields -->
            <hazmatFlag>1</hazmatFlag>
            <hazmatCategory>B</hazmatCategory>
            <!-- Print the "Hazardous Material" logo -->
            <hazmatPrintLogo>true</hazmatPrintLogo>
          </parcel>
        </letter>
    
    
    # label customization
    
    
    ## Customer Barcode
    
    
    It is possible to add an additional barcode associated with your reference for all national product codes, except for the 8R return offer. This barcode will be included on the label that you can print using a printer compatible with PDF and thermal formats (10x15 or 10x12). This update applies to labels that comply with GEOLABEL standards.
    
    
    Please note that this barcode must be provided in your request. To ensure optimal print quality, it is recommended not to exceed 17 alphanumeric characters and 25 numérics characters. This helps maintain an adequate quiet zone around the barcode, thus facilitating its reading. We encourage you to thoroughly test these references, especially regarding the maximum length of your barcodes.
    
    
    ## Advanced label customization


    This feature is intended for customers who want to enrich labels
    with dynamic fields (text or barcodes).


    Functionality:
      New tags are provided in the customizationFields object.
      It allows adding up to 50 custom fields on a label.

    <b>Available field types:</b>
      - TEXT: free text
      - BARCODE128: barcode


    <b>Required parameters</b>

    <table>
      <thead>
        <tr>
          <th><strong>Field</strong></th>
          <th><strong>Type</strong></th>
          <th><strong>Description</strong></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>type</strong></td>
          <td>string</td>
          <td>TEXT or BARCODE128</td>
        </tr>
        <td><strong>x</strong></td>
          <td>number</td>
          <td>Horizontal position (in inches)</td>
        </tr>
        <tr>
          <td><strong>y</strong></td>
          <td>number</td>
          <td>Vertical position (in inches)</td>
        </tr>
        <tr>
          <td><strong>taille</strong></td>
          <td>number</td>
          <td>Text size or barcode height</td>
        </tr>
        <tr>
          <td><strong>value</strong></td>
          <td>string</td>
          <td>Value to display or encode</td>
        </tr>
      </tbody>
    </table>



      <b>Field definitions</b>

      * type:
      Indicates the type of custom field added on the label.
      Accepted values:
        - TEXT
        - BARCODE128

      * Coordinates x / y: Positions are expressed in inches.

      * Origin (0,0): top-left corner, below the Colissimo / client separator bar.

      * size: This parameter depends on the field type:

        * For TEXT:
          Font size
          ZPL: values from 1 to 20
          DPL: values from 1 to 10

        * For BARCODE128:
          Barcode height

      * Code‑128 compression (set A, B, C) is automatic.

      * Maximum:
      Up to 50 custom fields can be added to a label.



      <b>Account-linked templates</b>

      - An account can be associated with a dedicated template.
      - Values sent in the print request are displayed
        according to the structure defined by this template.


      <b>JSON example</b>
    
          "customizationFields": {
            "customizationFields": [
              {
                "type": "BARCODE128",
                "x": 0,
                "y": 0,
                "taille": "10",
                "value": "123456"
              },
              {
                "type": "TEXT",
                "x": 20,
                "y": 20,
                "taille": "10",
                "value": "Jon Doe"
              }
            ]
          }
    
    
      <b>XML example</b>
    
          <customizationFields>
            <customizationField>
              <type>BARCODE128</type>
              <x>0</x>
              <y>0</y>
              <taille>50</taille>
              <value>123456</value>
            </customizationField>
            <customizationField>
              <type>TEXT</type>
              <x>200</x>
              <y>0</y>
              <taille>10</taille>
              <value>Jon Doe</value>
            </customizationField>
          </customizationFields>
    
    
    
