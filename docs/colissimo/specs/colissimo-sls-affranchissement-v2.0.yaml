  /getListMailBoxPickingDates:
    post:
      tags:
      - "Description and examples of WS SLS methods"
      summary: getListMailBoxPickingDates
      description: "The method <b>getListMailBoxPickingDates()</b> indicates\        \ whether an address is eligible for shipment from a mailbox and, if so, what\        \ the date and time are of the  <br/>parcel pick-up from this address. <br/><br/>This\        \ method will be used to validate the eligibility of the geographic address\        \ for a pick-up from a mailbox the next day, which then makes it possible\        \ to enter the pick-up date in the tag mailBoxPickingDate in the block Service\        \ when the subsequent shipping announcement is issued using the method GenerateLabel."
      operationId: getListMailBoxPickingDates_1
      parameters:
      - name: apiKey
        in: header
        description: apiKey 
        schema:
          type: string
      requestBody:
        content:
