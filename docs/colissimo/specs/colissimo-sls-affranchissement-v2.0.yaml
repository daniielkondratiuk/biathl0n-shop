    ## Secure return
    
    
    
    
    The generateToken method allows you to generate a secure code for your return shipments, replacing a conventional label. This innovative solution offers greater flexibility by enabling the label to be issued at the time of delivery, without the customer having to know the parcel number in advance or having to print the label. It also reduces fraud.
    
    
    <b>Requirements and activation</b>

    1) Activate the service in your Colissimo Box:
    
        * Log in to your Colissimo Box space
    
        * Go to the ‘Returns’ tab
    
        * Activate the ‘Secure return by secure code’ option
    
    2) Check the eligibility of your products:
    
        * Compatible with Colissimo return offers in France
    
        * Some products may not be eligible (error code 948)
    
    3) Use the Generatetoken method to obtain the secure code
    
    4) Customer communication:

        * Share the secure code with your customer
    
        * Provide clear instructions on how to use the code, explain the post office drop-off process, warn of the validity period of the secure code (10 days)

    5) Code management:

        * Keep a record of the codes generated
    
        * Plan a validity period for the codes
    
    
    
    
    ## How to reconstruct the Aztec code (2D)
    
    
    
    This feature allows customers who wish to do so to reconstruct the Aztec code (Cab2D) themselves in PNG format, completely independently.
    
    
    This solution covers Windows (with PowerShell + Zint Barcode Studio) and Linux (via bash + zint CLI) environments and is available only on version 3.0 of the WS SLS
    
    
    
    <b><u>Windows :  </u></b>
    
      * Install Zint Barcode Studio: https://sourceforge.net/projects/zint
    
    <b>Steps to generate Aztec PNG code:</b>
    
      <b>1) Prepare Cab2D content</b>
    
      Cab2D content (cab2dText)
    
      <b>2) Create a binary file (with PowerShell) script:</b>
    
        $escapedInput = 'contenu de cab2dText '  function Convert-ToBinaryBytes
    
        {      param([string]$str)      $regex = [regex] '\x([0-9a-fA-F]
        {2}
    
        )' 
    
        $bytes = New-Object System.Collections.Generic.List[Byte] 
    
        $cursor = 0 
    
        $matches = $regex.Matches($str)      foreach ($match in $matches) {          $start = $match.Index          $length = $match.Length          if ($start -gt $cursor)
        {              $textPart = $str.Substring($cursor, $start - $cursor)              $bytes.AddRange([System.Text.Encoding]::ASCII.GetBytes($textPart))          }
    
    
    
            $hex = $match.Groups[1].Value 
    
            $byte = [Convert]::ToByte($hex, 16) 
    
            $bytes.Add($byte) 
    
            $cursor = $start + $length 
    
        } 
    
        if ($cursor -lt $str.Length)
        {          $remaining = $str.Substring($cursor)          $bytes.AddRange([System.Text.Encoding]::ASCII.GetBytes($remaining))      }
    
    
    
            return $bytes.ToArray() 
    
        } 
    
        $binaryData = Convert-ToBinaryBytes $escapedInput 
    
        [System.IO.File]::WriteAllBytes("cab_data.bin", $binaryData) 
    
        Write-Host "Fichier 'cab_data.bin' généré avec succès."  
    
    <b>3) Generate PNG with Zint</b>
    
      * Open Zint Barcode Studio
    
      * Choose “Symbology”: Aztec Code
    
      * Import the file "cab_data.bin"
    
      * Save image
    
    <div align="center">
      <img alt="Response example for a Sand box" src="../images/imageCAB2D.png" width="60%"/>
    </div>
    
    <b><u>Linux</u></b>  
    
      * Install Zint: sudo apt install zint
    
      * Create a binary file (cab_data.bin) from the contents with \x1d, \x1e, etc.
    
    
    <b>script bash: </b>
    
    
        generate_cab.sh  #!/bin/bash 
    
    
    
        content=' 'contenu de cab2dText '  echo -e "${content//x/x}" > cab_data.bin  
    
    
    
      * Make the script executable and run it:
    
    
        chmod +x generate_cab.sh 
    
    
    
        ./generate_cab.sh  
    
    
    
    This will create a cab_data.bin file containing the correct binary bytes.
    
    
    
     * Generate PNG with Zint
    
    
        zint -b 92 -i cab_data.bin -o code_aztec.png  
    
    
    
    -b 92 → Aztec Code 
    
    
    -i → binary input 
    
    
    -o → output image file name Result:
    
    
    A PNG image containing a valid Aztec code with the correct control characters (GS, RS, EOT, etc.). 
    
    
    
    
    
