    ## International Offer
    
    
    The international offer brings a new parameter \<reseauPostal\> inside the \<service\> bloc. This parameter enables the possibility to choose the Postal Partner responsible of the shipping (DPD or the local postal network), for international shipments among the concerned countries.
    
    
    * The countries covered by the Postal Partner option are available <a href="https://www.colissimo.entreprise.laposte.fr/offres-et-tarifs/offre-international">here</a>
    
    
    
    The product concerned by this offer is the CB product (DOS, Colissimo Home - with signature).
    
    
    The configuration of this parameter is as follows:
    
    
    * reseauPostal = 0, DPD is selected for the shipment
    
    * reseauPostal = 1, the local postal network is selected for the shipment
    
    
    
    ## Shipping to the United States without DDP
    
    
    As part of changes to US customs regulations in August 2025, adjustments are necessary to continue shipping packages to the United States without the DDP (Delivered Duty Paid) option :

      * The shipper's EORI number must be provided
    
    
      ```xml
      <field>
         <key>EORI</key>
         <value>1234567</value>
      </field>
      ```
    
    
      * The destination address must be provided in the form of a two-letter code
    
      * The recipient's mobile phone number must be provided
    
      * The items on the customs declaration must be described in English
    
    
    
    ## The Customs declaration document "CN23"
    
    
    This declaration is mandatory for the customs clearance of parcels sent to an international destination and some special territories.
    
    
    It must be printed in 4 copies attached to the parcel.
    
    
    The document can be published using the Web Service or the customer’s own resources.
    
    
    Example of a CN23 form for an Outbound shipment (non-contractual image):
    
    
    
    <div align="center">
      <img alt="A CN23 document" src="../images/Image11.png" style="width:800px;" />
    </div>
    
    
    Example of a CN23 form for an international Return shipment (non-contractual image):
    
    
    <div align="center">
      <img alt="A CN23 document" src="../images/Image12.png" style="width:800px;" />
    </div>
    
    To obtain a CN23 form, the following blocks in particular should be filled in:
    
    
    * Services,
    
    * Parcel,
    
    * customsDeclarations.


    Example of form CN23 with the DDP option
    
    <div align="center">
      <img alt="A CN23 with the DDP option" src="../images/Image13.png" style="width:800px;" />
    </div>
    
    
    

    
    Some countries and special territories require a customs declaration using the CN23 form. La Poste has an obligation to send a digital version of the CN23 customs declaration to its partners in charge of customs clearance for goods.
    
    
    The CN23 information must be transmitted to La Poste by the Web Service.
    
    
    Except in the case of electronic declarations, 4 copies of the customs declaration must be printed and enclosed with the parcel.
    
    
    If the CN23 data are not transmitted or are incomplete, the Web Service returns an ERROR code and the label cannot therefore be printed.


    * <b>tag "category":</b>


    Indicates the type of the shipment (for international shipments or shipments to overseas France to which the CN23 customs declaration applies). It can take only the following values:


