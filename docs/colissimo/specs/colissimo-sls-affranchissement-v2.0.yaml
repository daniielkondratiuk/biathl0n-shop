    <b>Importants comments:</b>
    
    
    * The ZPL, DPL and PDF outputs from the Colissimo labelling web service do not need to be validated by our services.
    
    
    * <b>We advise shippers with high printing volumes</b> (of over 1,000 packages per month) <b>to choose</b> the thermal formats <b>(ZPL or DPL) to make their logistics chain more fluid</b>.
    
    
    * The labels generated by our PDF, ZPL and DPL outputs must be printed without any resizing so as not to alter the quality of the barcodes.
    
    
    * The thermal outputs from the web service are compatible with media, including widths from 103 to 113 x 152 (l/h in mm) with an adhesive surface area of 100 x 150 minimum (corresponding to the label mask).
    
    
    * If additional information needs to be displayed on the printing medium, it is recommended to do so outside the label mask created by our Web Service. By default, La Poste – Colissimo cannot be held liable for any reading issues encountered in its network.
    
    
    * 7R labels (Colissimo Retour International) can only be generated with the <b>PDF_A4_300dpi</b> output.
    
    
    * Colissimo offers the option of printing the label and the CN23 on the same page: Label format 10x15 and A4 including "_UL".
    
    
    * For thermal printing ZPL , labels generated by the web service use the "direct transfer" printing mode. Check that your printer is not configured in the "thermal transfer" mode.
    
    
    Notes: This document displays a maximum of 3 items. However, all items are included in the total weight and value.
    
    ## Display of data on the labels
    
    
    The data sent to the Web Service are not all displayed on the label generated.
    
    
    They can also be truncated depending on the space available. However, truncated data is still <u>sent in full within the information system used by</u> La Poste Colissimo.
    
    
    The characteristics related to the cutting of the data varies depending on the printing formats (thermal or office) or according to our products.
    
    
    
    # Label part
    
    
    The label meets geolabel standards and presents different blocks with the following information:
    
    
    <div align="center">
      <img alt="A geolabel label" src="../images/geolabel-en.jpg" />
    </div>



    <b>Recipient block (from your parcel data)</b>
    
    
    Commercial name
    SURNAME First name
    Address
    Address 1
    Address 2
    Address 3 (No. and street)
    Postal code - TOWN
    Consignee reference
    
    
    <b>Sender block (from your parcel details)</b>
    
    
    Commercial name
    SURNAME First name
    Address
    Address 1
    Address 2
    Address 3 (No. and street)
    Postcode - TOWN
    Telephone
    Account number
    
    
    <b>Carriers: Logos of the companies carrying out the transport</b>
    
    
    <b>Delivery details (from your parcel data)</b>
    
    
    <b>Depending on the type of offer:</b>
    
    
    Option 1:
    Parcel number
    Drop-off site
    Telephone: fixed/mobile
    Door/intercom code
    Delivery instruction
    Customer reference
    
    Option 2:
    barcode with parcel number
    
    
    <b>2D astek code (created by Colissimo)</b>
    
    
    Used for transport
    
    
    <b>Parcel details (created by Colissimo)</b>
    
    
    Offer, with or without signature....
    
    
    <b>Parcel characteristics (taken from your parcel data)</b>
    
    
    Package position in the grouping
    Weight
    
    
    <b>Routing information (created by Colissimo)</b>
    
    
    Parcel number + key
    Service code
    Manual sort code
    Route identifier
    Destination sort ID
    Origin sort ID
    Routing barcode
    
    
    
    <b>Customisable area (based on your parcel data) - available on labels larger than 10x12</b>
    
    
    Customer reference barcode or parcel number barcode, depending on the data entered.

    enter Customer barcode=1 to display the customer reference

    enter Customer barcode=2 to display the parcel number as a barcode
    
    
    
    
    
    
    ## Right side of the label (A4 format only)
    
    
    The right part of the freight list is used as the communication space between the e-retailer and its customer. It is composed of 3 parts:
    
    
    <div align="center">
      <img alt="Right side of a label" src="../images/etiquette6.png" />
    </div>
    
    
    <u>Description of the areas:</u>
    
    
    1.Space for the "Colissimo" logo: for Colissimo solutions with certificate of posting and Retour Colissimo, 
    
    
    2.Instructions for use of the label: for the Retour Colissimo solution, the contents of this block varies depending on the delivery options (see below),
    
    
    3.Certificate of posting (available according to the contract): summary to be stamped by La Poste on depositing the parcel.



    ### Model for drop-off in a post office or in a store
    
    
    This slip is issued by La Poste if the address of the sender does not allow access to the shipment service from their personal mailbox.
    
    
    <div align="center">
      <img alt="Return label for post office drop-off" src="../images/Image7.png" />
    </div>
    
    
    ### Model for drop-off in a post office or in a store or in a mailbox (pick-up date not chosen)
    
    
    This slip is issued by La Poste if the address of the sender allows access to the shipment service from their personal mailbox.
    
    
    
    <div align="center">
      <img alt="Return label in a mail box drop-off (pick-up date not chosen)" src="../images/Image8.png" />
    </div>
    
    
    ### Model for a drop-off with request for pick-up from a mailbox (chosen date)
    
    
    This slip is issued by La Poste if the address of the sender allows them access to the personal mailbox shipment service and if the e-retailer has included the request for pick-up from a mailbox on its e-commerce website.
    
    
    The parcel pick-up date from the mailbox is then indicated on the right side of the slip.
    
    
    
    <div align="center">
      <img alt="Return label in a mail box drop-off (pick-up date chosen)" src="../images/Image9.png" />
    </div>
    
    
    
