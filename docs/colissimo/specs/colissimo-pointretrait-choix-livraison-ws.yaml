      ## II.7 Appel du web service en mode GET
       
      ### II.7.1 Méthode findRDVPointRetraitAcheminement
        
        
      Les paramètres d’entrée en mode GET via HTTPS de la méthode <strong>findRDVPointRetraitAcheminement</strong> sont les mêmes que ceux listés pour l’interface SOAP.<br>
        
      <strong>Exemple de requête :</strong>
        
        
        https://ws.colissimo.fr/pointretrait-ws-cxf/PointRetraitServiceWS/2.0/findRDVPointRetraitAcheminement?apikey=[apikey]&codTiersPourPartenaire=[codTiersPourPartenaire]&address=[address]&zipCode=[zipCode]&city=[city]&countryCode=[countryCode]&weight =[weight]&shippingDate=[shippingDate]&filterRelay=[filterRelay]&requestId=[requestId]&lang=[lang]&optionInter=[optionInter]

        
      Pour ne pas passer un paramètre, il faut supprimer entièrement le paramètre (ne pas transmettre ce paramètre avec une valeur vide).<br>
        
      Par exemple l’appel suivant est incorrect :
        
        https://ws.colissimo.fr/pointretrait-ws-cxf/PointRetraitServiceWS/2.0/findRDVPointRetraitAcheminement? apikey=[apikey]&address&zipCode=75013&city=Paris&countryCode=FR&weight&shippingDate=29/08/2013&filterRelay=1&requestId=abcdef123456&lang&optionInter

        
      L’appel doit être :
        
        
        https://ws.colissimo.fr/pointretrait-ws-cxf/PointRetraitServiceWS/2.0/findRDVPointRetraitAcheminement? apikey=[apikey]&zipCode=75013&city=Paris&countryCode=FR&shippingDate=17/10/2017&filterRelay=1&requestId=abcdef123456
        
