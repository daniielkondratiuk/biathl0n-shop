     <strong>*Cas particulier de l’utilisation du Web Service par les plateformes d’échanges entre particuliers :</strong>
     
     Dans ce cas précis, le processus de vente implique trois acteurs :
     - Le chargeur (site Internet d’échanges),
     - Un vendeur (client du chargeur), 
     - Un acheteur (lui aussi client du chargeur).  
     
     La « shipping date » correspond ici à la date prévisionnelle d’envoi du colis par le vendeur. Elle permet d’identifier la disponibilité ou non d’un Point de Retrait. 
     Cette date est fonction de la date de commande par l’acheteur, et tient compte de différents délais relatifs à la transaction acheteur/vendeur : éventuel délai de 
     confirmation de vente par le vendeur, délai d’impression de l’étiquette, délai de dépôt du colis en Bureau de Poste, etc.
     
     En mode normal le web service prend en compte le nom de la ville et l’adresse. Il affiche jusqu’à 20 points de retrait (bureau de poste et relais commerçant en 
     fonction du filtre appliqué).
     
     S’il ne trouve pas le couple adresse ville, il effectue une recherche avec le code postal et l’adresse. S’il n’en trouve toujours pas, il effectue une recherche avec 
     le barycentre du code postal.
     
     En mode dit « dégradé »,  le web service effectue une recherche avec le barycentre du code postal et renvoie seulement 10 points de retrait au maximum.
     
