    # I. Introduction
    
    ## I.1 Object du document

    Dans le cadre de l’offre La Poste, Colissimo met à disposition de ses clients e-commerçants un Web Service qui restitue les différents modes de livraison proposés pour les destinataires de leurs colis : 
     
      - En bureaux de Poste en France, et à l’international
     
      - En points relais commerçant et consignes du réseau national et international<br>
      
      Les pays éligibles à l’international sont listés en annexe V.3 Inter : Liste des pays éligibles.
      
    Ce document décrit les généralités du protocole SOAP utilisé ainsi que les modalités d’accès au Web Service Choix de Livraison.
      
     

