     # V. ANNEXES
       
       ## V. 1 Front Office client : Points de vigilance
       
       
       La mise en place de l’offre Colissimo Point Retrait sur le Front Office d’un client chargeur,
       implique de respecter un certain nombre de points de vigilance importants.
       
       Ces points de vigilance permettent notamment de s’assurer :
       - D’éviter tout malentendu du client destinataire, sur la nature de la prestation de transport (présentation appropriée de l’offre Colissimo, récapitulatif du mode delivraison, …).
       - Que cette étape en amont permette de récupérer les données indispensables au bon déroulement de la prestation de transport 
       (données de livraison exhaustives, informations de contact du destinataire, …).<br><br>
       La Poste – Colissimo demande à ses clients chargeurs, en préalable du lancement effectif de
       l’offre sur leur site de production, de bien vouloir l’associer à leur phase de validation de
       cette partie de leur Front Office, en communiquant à leur interlocuteur commercial, un
       compte de test. <br><br>
