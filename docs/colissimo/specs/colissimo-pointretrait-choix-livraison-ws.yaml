      <strong>*Cas particulier de l’utilisation du WebService par les plateformes d’échanges entre particuliers :</strong>
         
       Dans ce cas précis, le processus de vente implique trois acteurs :
         
       - le chargeur (site Internet d’échanges),
       - Nn vendeur (client du chargeur),
       - Un acheteur (lui aussi client du chargeur).
         
       La « date » correspond ici à la date prévisionnelle d’envoi du colis par le vendeur. Elle permet
       d’identifier la disponibilité ou non d’un Point Retrait. Cette date est fonction de la date de
       commande par l’acheteur, et tient compte de différents délais relatifs à la transaction
       acheteur/vendeur : éventuel délai de confirmation de vente par le vendeur, délai d’impression
       de l’étiquette, délai de dépôt du colis en Bureau de Poste, etc.
         
         
         
         
