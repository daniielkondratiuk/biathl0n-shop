      ## V.2 Types de points retournés
                     
                     
     Différents types de points de retrait peuvent être retournés par la méthode findRDVPointRetraitAcheminement. Le type d’un point se retrouve dans 
     le trigramme <strong>typeDePoint</strong> retourné dans la réponse de la méthode findRDVPointRetraitAcheminement (cf. II.5.2 Réponse).<br><br>
            
