    ## I.5 Gestion des caractères accentués
    

    Le Charset à utiliser pour invoquer le web service est : UTF-8.


    # II. LE WEB SERVICE CHOIX DE LIVRAISON

    L’invocation du Web Service par le chargeur s’effectue via une requête HTTPS encapsulant une demande de restitution de points de retrait.<br><br>
    Le Web Service décrit dans ce document propose les méthodes suivantes :
    
      - <strong>la méthode findRDVPointRetraitAcheminement :</strong> à partir d’une adresse postale fournie en entrée, restitue les points de retrait les plus proches de cette adresse.
    
      - <strong>la méthode findPointRetraitAcheminementByID :</strong> à partir d’un Identifiant de Point Retrait (identifiant Point Retrait), restitue le détail des informations associé au Point Retrait transmis.


    ## II.1  Accès au web service

    Le Web service Choix de Livraison est accessible depuis l’adresse url suivante :<br><br>
    
    En SOAP : <br> 
    https://ws.colissimo.fr/pointretrait-ws-cxf/PointRetraitServiceWS/2.0?wsdl <br><br>
    
    En REST : <br>
    
    Obtenir la liste des Points de retrait proche d'une adresse :<br>
    https://ws.colissimo.fr/pointretrait-ws-cxf/rest/v2/pointretrait/findRDVPointRetraitAcheminement<br><br>
    
    Obtenir le détail sur un point de retrait :<br>
    https://ws.colissimo.fr/pointretrait-ws-cxf/rest/v2/pointretrait/findPointRetraitAcheminementByID
    
    
    Ce service nécessite l’utilisation d’une clé d’authentification (apikey) que vous pouvez générer depuis votre espace client (CBOX) sous 
    https://www.colissimo.fr/entreprise où vous pourrez obtenir la dernière version disponible de cette documentation.
    
    Tout usage jugé non-conforme par La Poste entraînera la coupure du service sans préavis.
    
    
    <strong>Expiration et renouvellement de la clé de connexion aux Web Services</strong><br><br>
    
    La clé d'authentification n'a pas de durée de vie limitée pour le moment. Il est de votre responsabilité de régulièrement mettre à jour votre clé régulièrement via la Cbox.<br><br>
    
    Vous pouvez la mettre à jour en vous connectant avec vos identifiants (nom d'utilisateur et mot de passe) à la Cbox, puis aller dans l'espace d'édition de votre profil, 
    et cliquer sur le bouton "générer" à côté du champ "Clés de connexion aux Web Services".<br><br>
    
    La mise à jour est immédiate. Attention, si vous modifiez votre clé de connexion dans l'espace client, vous devez également le modifier dans l'invocation du web service, 
    faute de quoi l'accès au web service sera refusé.<br><br>
    
    
    <strong>Gestion des Erreurs d'Authentification</strong><br><br>
    
    En cas d'erreur d'authentification, l'API renverra un code d'état  avec un message décrivant la nature de l'erreur. Assurez-vous de gérer ces erreurs correctement dans votre 
    application pour offrir une bonne expérience utilisateur.<br><br>
    
    <strong>Bonnes Pratiques</strong><br><br>
    
    - Sécurité : Ne partagez que si nécessaire votre clé de connexion aux Web Services. Traitez-le comme un mot de passe.
    
    - Stockage : Stockez votre jeton de manière sécurisée sur le client (par exemple, dans un stockage sécurisé côté client).
    
    - Renouvellement : Changez régulièrement votre clé d'authentification.



    ## II.2 Les différents modes d’authentification
    
    
    1. L’utilisateur est le propriétaire du compte pour lequel il effectue la recherche, il utilisera un apiKey.<br><br>
    
    2. L’utilisateur est un partenaire qui recherche pour le compte d’un client, il utilisera : apiKey plus code tiers du compte (codTiersPourPartenaire).
    
    
    <strong>Exemple du paramètre de connexion en SOAP :</strong>
   
               
    1. Authentification d’un admin par apiKey
                
           <apikey>MY_API_KEY</apikey>
                    
    2. Authentification d’un partenaire par apiKey et code partenaire
    
           <apikey>MY_API_KEY</apikey>
           <codTiersPourPartenaire>100001</codTiersPourPartenaire>


    <strong>Exemple du paramètre de connexion en REST :</strong>
    
    
    1. Authentification d’un admin par apiKey
    
            "apikey": "MY_API_KEY"

    2. Authentification d’un partenaire par apiKey et code partenaire
           
             "apikey": "MY_API_KEY",
             "codeTiersPourPartenaire": "XXXXXX"

                        
    
    ## II.3 Supervision du web service et continuité du processus de commande


    En sus des mécanismes de supervision des infrastructures applicatives et matérielles qui ne garantissent pas par eux-mêmes la disponibilité de l’ensemble 
    de la chaine de traitement, la Poste - Colissimo recommande aux chargeurs la mise en oeuvre
     
     - D’un contrôle préalable à l’invocation du Web Service.
     - Pour ce faire, La Poste - Colissimo met à disposition des chargeurs, l’URL de supervision suivante pour permettre de vérifier si le Web Service est disponible : <br>
       http://ws.colissimo.fr/supervision-wspudo/supervision.jsp
     
     Cette URL pointe sur une page qui affiche [OK] si le WS est opérationnel. Elle affiche [KO] dans le cas contraire.
     
     La vérification de disponibilité du service consiste en l’appel de la page de supervision par le chargeur suivi de la recherche de la chaîne de caractère [OK] dans cette page.
     
     
     ## II.4 Sécurité : préconisation du protocole HTTPS
     
     L’accès à ce web service étant protégé par un identifiant et un mot de passe, données à
     caractère sensible, Colissimo préconise d’utiliser le protocole HTTPS pour le transport de ces données.
     
     Ne pas utiliser ce protocole expose le Client à l’interception par un tiers malveillant, de ses identifiants,
     ce qui permettrait à ce dernier d’usurper l’identité du Client, et ainsi :
     
     - D’accéder à son espace entreprise (facture online, suivi des colis)
     - De commander des produits, qui seront ensuite facturés au compte client usurpé
     - D’accéder aux autres solutions mises à disposition par Colissimo
     
     
     Le Client s'engage à prendre toutes mesures propres à assurer la sécurité et la confidentialité de son identifiant et de son mot de passe.
     
     
     Tout accès et transmission de données effectuées et plus largement toute opération effectuée en utilisant
      l’identifiant et le mot de passe du Client sont réputées effectués par ce dernier.
      
