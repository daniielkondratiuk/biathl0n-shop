       3 Dimension en développé = longueur + largeur + hauteur
       
       Pour bénéficier de la tolérance offerte par les points de type « ACP », « CDI », et « BDP », il convient donc :
       
       
       - De ne pas mettre en place en amont de l’appel au web service, de filtrage global au-delà de 20 kg
       - De fournir le poids du colis dans le paramètre d’appel approprié (§II.5.1 : Weight).
       - D’autoriser la sélection des points ACP et CDI pour les colis allant jusqu’à 200 cm en développé, si votre Front-Office gère ce critère à cette étape du parcours client.
       
       
       Les types de point ACP et CDI mettent tous à disposition des clients les services suivants :
       
       - Un parking dédié
       - Des outils de manutention pour faciliter le transport du/des colis jusqu’au véhicule
       - Une accessibilité aux personnes à mobilité réduite<br><br>
      
      
