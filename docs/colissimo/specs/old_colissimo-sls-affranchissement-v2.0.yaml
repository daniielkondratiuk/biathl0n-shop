    <b>Remarques importantes :</b>
    
    
    * Les sorties ZPL, DPL et PDF issues du web service d'étiquetage Colissimo ne nécessitent pas de validation auprès de nos services.
    
    
    * <b>Nous recommandons aux chargeurs ayant de forts volumes d'impression</b> (à partir de 1000 colis par mois) <b>de choisir</b> des formats thermiques et <b>de préférence le format universel ZPL afin de fluidifier leur chaîne logistique.</b>
    
    
    * Les étiquettes générées par nos sorties PDF, ZPL et DPL doivent être imprimées sans aucun redimensionnement, afin de ne pas altérer la qualité des codes-barres.
    
    
    * Les sorties thermiques du web service sont compatibles avec des supports, laize comprise de 103 à 113 x 152 (l/h en mm), dont une surface adhésive de 100 x 150 minimum (correspondant au masque de l'étiquette).
    
    
    * S'il est besoin d'afficher des éléments supplémentaires sur le support d'impression, il est recommandé de le faire en dehors du masque de l'étiquette créée par notre web-service. A défaut, l'organisation La Poste – Colissimo ne saura être tenue pour responsable des problèmes de lecture rencontrés dans son réseau.
    
    
    * Les étiquettes 7R (Colissimo Retour International) ne peuvent être générées qu'avec la sortie <b>PDF_A4_300dpi</b>.
    
    
    * Colissimo propose à ses clients d’imprimer sur la même page l’étiquette ainsi que la CN23 : Format d’étiquettes 10x15 et A4  comprenant « _UL »


    * Pour les impressions thermiques ZPL les étiquettes générées par le Web Service utilisent le mode d'impression « transfert direct ». Vérifiez bien que votre imprimante ne soit pas configurée en mode « transfert thermique ».


    Remarques : Ce document n’affiche que 3 articles maximum. Cependant, la totalité des articles est bien compris dans le poids et la valeur total.
    
    
    ## Affichage des données sur les étiquettes
    
    
    Les données transmises au Web Service ne sont pas toutes affichées sur l'étiquette générée.
    
    
    Elles peuvent également être tronquées en fonction de la place disponible. Cependant, une donnée tronquée reste <u> transmise dans son intégralité au sein du système d'information </u> de La Poste Colissimo.
    
    
    Les caractéristiques de la troncature des données varient selon les formats d'impression (thermique ou bureautique) ou selon nos produits.
    
    
