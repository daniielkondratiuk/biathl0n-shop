    ### Méthodes pour générer des documents
    
    
    Un bordereau de dépôt (ou parfois appelé une preuve de remise) est un document postal qui, une fois tamponné et daté par La Poste, atteste de la bonne prise en charge de vos colis, tracés pour son expédition.
    
    
    Il s’agit généralement d’une liste de colis. Lorsque vous déposez vos colis en bureau de poste ou lors de la collecte par le transporteur, l’agent flashera le document, et tamponnera avec le timbre à date et vous la remettra comme preuve de bonne prise en charge.
    
    
    Il y a plusieurs possibilités pour éditer ce document :
    
    
    
     * Soit via ses propres moyens sur la base du modèle détaillé dans la section modèle détaillé du bordereau
    
    
     * Soit via les opérations du Web Service décrites ci-dessous
    
    
    
