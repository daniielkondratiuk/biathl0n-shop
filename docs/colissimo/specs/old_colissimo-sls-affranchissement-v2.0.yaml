            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
                <soap:Body> 
                    <soap:Fault>
                        <faultcode>soap:Client</faultcode>
                        <faultstring>Unmarshalling Error: 2x015-03/23</faultstring>
                    </soap:Fault>
                </soap:Body>
            </soap:Envelope> 
    
    
    <b>Cas 2: Boolean invalide</b>
    
    
    
            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
               <soap:Body>
                  <soap:Fault>
                     <faultcode>soap:Client</faultcode>
                     <faultstring>Unmarshalling Error: cvc-datatype-valid.1.2.1: 'eeee' is not a valid value for 'boolean'.</faultstring>
                  </soap:Fault>
               </soap:Body>
            </soap:Envelope> 


    <b>Cas 3 : Donnée obligatoire non renseignée :</b>
    
    
    
            <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
               <soap:Body>
                  <soap:Fault>
                     <faultcode>soap:Client</faultcode>
                     <faultstring>Unmarshalling Error: cvc-complex-type.2.4.a: Invalid content was found starting with element 'city'. One of '{zipCode}' is expected.</faultstring>
                  </soap:Fault>
               </soap:Body>
            </soap:Envelope>
    
    
    
    # Informations supplémentaires
    
    
    
    
    ## Gestion de la Numérotation Colis
    
    
    
    Le numéro colis est défini par Colissimo et fonctionne sur un système de plage.
    Toute plage colis allouée à un code produit donné :
    
    
    
    * a une durée de vie d'environ 1 an et demi,
    
    
    
    * est automatiquement réinitialisée après le dernier numéro de colis.
    
    
    
    
    
    
    
    Cela signifie que :
    
    
    
    * Pour tout client, pour un code produit donné et une plage de numéros de colis, si un appel du web service utilise le dernier numéro de la plage, l'appel suivant va automatiquement utiliser le 1er numéro de colis de la même plage.
    
    
    
    Exemple :
    
    
    
    Pour une plage 6A allant du numéro 00000001 au numéro 99999999,
    
    
    
    Si, pour un colis de type 6A, lors d'un 1er appel, le web service du client lui génère un colis 6A99999999,
    
    
    
    Alors, pour un colis de type 6A, lors de l'appel suivant, le web service du client va lui générer un colis 6A00000001
    
    
    
    * Nos clients doivent prendre en compte la règle de gestion ci-dessus dans leurs bases de données internes pour pas que les historiques de suivi de leurs colis ne se confondent.
    
    
    
    Pour les aider dans leur logistique, nous suggérons à nos clients de rajouter un numéro de référence de commande associée à leur colis via la balise <orderNumber> du bloc <service> qu'ils retrouveront dans leur tracking (notamment via le flux EDI-Retour).
    
    
    
    
    

    ## Codes pays et codes postaux

    
    
    
    
    Les codes pays et codes postaux répondent à des normes internationales qui doivent être respectées pour assurer le bon acheminement des colis. Un contrôle de cohérence est effectué entre le code postal et le code état/province. En cas d'incohérence, le WS retournera l'erreur 30224
    
    
    ### Code pays (balise countryCode)
    
    
     * Les codes pays transmis doivent correspondre à la norme ISO 3166 : <a href="https://www.iso.org/obp/ui#search>"Online Browsing Platform (OBP)</a>
    
     * Pour les territoires spéciaux rattachés à d'autres pays :
        
         ** Utiliser le code du territoire spécial et non celui du pays de rattachement
     
         ** Exemple : « GL » pour le Groenland (rattaché au Danemark) et non pas « DK »
    
    
    ### Code postal (balise zipCode)
    
    
    
     * La validité du format est vérifiée selon le pays de destination. Exemple : un code postal canadien doit contenir 6 caractères
    
     * Pour les codes postaux CEDEX, l'adresse complète est obligatoire
    
     * Pour connaître les formats des codes postaux internationaux, utiliser la méthode checkInterPostalCode
    
    
    ### Code État/Province (balise stateOrProvinceCode)
    
    Certains pays requièrent obligatoirement un code état/province pour compléter l'adresse (États-Unis, Canada, autres pays selon réglementation). Obligatoire pour les Etats Unis.
    
    
