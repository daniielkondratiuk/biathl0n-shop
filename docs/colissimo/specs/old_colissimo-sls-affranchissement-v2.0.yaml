    ## Offre « Colissimo Flash »
    
    
    
    
    
    Les produits Flash, qui réalisent une livraison en France métropolitaine en J+1, font l'objet d'un déploiement progressif sur le territoire français. 
    
    
    
    
    <b>Seuls certains codes postaux sont donc adressables pour affranchir un colis « Flash».</b>
    
    
    
    
    
    L'éligibilité d'une livraison en J+1 est conditionnée par :
    
    
    
    
    
    * le lieu de dépose du colis dans le réseau Colissimo (c'est-à-dire la PFC Plate-Forme Colis) de rattachement du client Colissimo, attachée au numéro de compte client considéré),
    
    
    
    * le code Postal de destination,
    
    
    
    * l'heure limite de dépôt du colis dans le réseau Colissimo.
    
    
    
    
    <b>L'éligibilité d'un code postal de destination</b> dans le cadre d'une livraison « Colissimo Flash » pourra être confirmée par l'un ou l'autre des dispositifs suivants : 
    
    
    
    * Un webService d'éligibilité aux offres. Ce web-service, qui sera décrit dans des spécifications tierces.
    
    
    
    * Un flux EDI asynchrone fournissant le fichier des codes postaux éligibles à chaque fois que ce fichier sera mis à jour, en fonction de l'évolution de la couverture de l'offre.
    
    
    
    
    A défaut, une liste à plat pourra être communiquée par l'interlocuteur commercial du client.
    
    
    
    ## Envois internationaux ou vers l'Outre-Mer
    
    
    * <b>Balise countryCode:</b>
    
    
    
    Le code pays transmis dans la balise <b>countryCode</b> doit correspondre à l'un de ceux de la table des pays transmis dans un document annexe.
    
    
    
    Exemples : 
    
    
    
    * pour un envoi en Chine il faudra indiquer \<countryCode\>CN\</countryCode\>,
    
    
    
    * pour un envoi en Martinique il faudra indiquer \<countryCode\>MQ\</countryCode\>.
    
    
    
    Attention, pour les territoires spéciaux rattachés à d'autres pays, la valeur de la balise <b>\<countryCode\></b> doit correspondre à celle du territoire spécial et non pas celle de son pays de rattachement.
    
    
    
    Exemple :
    
    
    
    Il faudra indiquere « GL » pour le Groenland (rattaché au Danemark) et non pas « DK ».
    
    
    
    
    * <b>Balise zipCode:</b>
    
    
    
    La validité du format du code postal est vérifiée pour le pays de destination (selon le code pays transmis dans la balise <b>\<countryCode\></b>). Par exemple on vérifiera qu'un code postal transmis pour le Canada contient 6 caractères.
    
    
    
    * <b>Balise returnTypeChoice:</b>
    
    
    
    Clé désignant l'action à effectuer en cas de retour d'un colis (pour les offres Expert I, ou Colissimo International).
    
    
    
    Pour connaître les options autorisées pour un pays, appeler la méthode <a href="#tag/SlsServiceWS-:-documentation/operation/getProductInter"><b>getProductInter</b></a>.
    
    
    
    Plus d'informations sur colissimo.fr
    
    <table>
    <thead>
    <tr>
    <th>Option en cas de non livraison </th>
    <th>Mention sur l&rsquo;&eacute;tiquette</th>
    <th>Valeur de &lt;returnTypeChoice&gt;</th>
    </tr>
    </thead>
    <tbody>
    <tr>
    <td><b>Retour payant en prioritaire</b> (Hors Union Europ&eacute;enne seulement) </td>
    <td>Return to the sender as priority parcel</td>
    <td>2</td>
    </tr>
    <tr>
    <td><b>Ne pas retourner</b> (Toutes les destinations)</td>
    <td>Do not return to the sender</td>
    <td>3</td>
    </tr>
    </tbody>
    </table>
    
    
    
    
    
    
    ## Offre internationale
    
    
    
    L'offre internationale ajoute le paramètre <reseauPostal> au bloc <service>. Ce paramètre permet de choisir le Partenaire Postal responsable de la livraison (DPD ou réseau postal local) pour tout envoi de colis à l'international, parmi les pays concernés. 
    
    
    
    * Les pays concernés par l'option Partenaire Postal sont disponibles <a href="https://www.colissimo.entreprise.laposte.fr/offres-et-tarifs/offre-international">ici</a>
    
    
    
    Le produit concerné est le produit CB (DOS, Domicile avec signature).
    
    
    
    Le paramètre se configure de la manière suivante : 
    
    
    
    * reseauPostal = 0, choix de réseau DPD pour livrer le colis
    
    
    
    * reseauPostal = 1, choix du réseau postal local pour livrer le colis
    
    
    
    ## Envoi vers les États-Unis sans DDP
    
    
    Dans le cadre de l'évolution des réglementations douanières américaines au mois d'Aout 2025, des ajustements sont nécessaires pour continuer à expédier des colis vers les États-Unis sans l’option DDP (Delivered Duty Paid) :

      * L'EORI expéditeur doit être obligatoirement renseigné
  

      ```xml
      <field>
         <key>EORI</key>
         <value>1234567</value>
      </field>
      ```

    
      * L'état de l'adresse de destination doit être envoyé sous la forme d'un code à deux lettres
    
      * Le numéro de téléphone portable du destinataire doit être renseigné
    
      * Les articles de la déclaration douanière doivent être décrits en anglais
    
    
    ## Document de déclaration en douane « CN23 »
    
    
    
    Cette déclaration est obligatoire pour dédouaner les colis expédiés vers l'international et vers certains territoires spéciaux.
    
    
    
    Elle doit être imprimée en 4 exemplaires qui seront joints à l'envoi.
    
    
    
    Le document peut être édité en faisant appel au Web Service ou par des moyens propres au client.
    
    
    
    <b> Exemple de formulaire CN23 pour un colis en expédition Aller (image non contractuelle) : </b>
    
    
    
    
    <div align="center">
      <img alt="A CN23 document" src="../images/Image11.png" style="width:800px;" />
    </div>
    
    
    <b> Exemple de formulaire CN23 dans le cas d'un Retour Inter (image non contractuelle) : </b>
    
    
    <div align="center">
      <img alt="A CN23 document" src="../images/Image12.png" style="width:800px;" />
    </div>
    
    
    Pour obtenir la CN23, il convient en particulier de renseigner les blocs suivants :
    
    
    * Services,
    
    
    * Parcel,
    
    
    * customsDeclarations.


    <b>Exemple de formulaire CN23 avec l'offre DDP</b>
    
    
    <div align="center">
      <img alt="A CN23 with the DDP option" src="../images/Image13.png" style="width:800px;" />
    </div>
    
    
    
    
    
    
    Pour certains pays et territoires spéciaux, une déclaration en douane sur formulaire CN23 est nécessaire. La Poste a pour obligation de transmettre la déclaration CN23 en version dématérialisée à ses partenaires en charge du dédouanement des marchandises. Sauf cas de dématérialisation la déclaration de douane doit être imprimée en 4 exemplaires qui seront joints à l’envoi.
  
  
    Les informations de la CN23 doivent être transmises à la Poste par le Web Service dans la section customsDeclarations. Si les données CN23 ne sont pas transmises ou sont incomplètes, le Web Service retourne un code ERROR et l'étiquette ne peut pas être imprimée.
    
    
    
    
    <b>Balise <category> :</b>
    
    
    
    Indique la nature de l'envoi (pour les envois internationaux ou vers l'outre-mer soumis à la déclaration CN23). Il ne peut prendre que les valeurs suivantes :
    
    
    
