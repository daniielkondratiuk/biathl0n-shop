          type: boolean
          description: "<i>B</i> <br/>  Permet d’inclure, dans la réponse du web service,\            \ la génération d’un document CN23 au format PDF portant sur les articles\            \ déclarés dans la requête web service. <br/><br/> Par défaut vaut \"\            true\" (ou \"1\") pour inclure le document CN23 dans la réponse du web\            \ service.  <br/><br/> Indiquez \"false\" (ou \"0\") pour ne pas inclure\            \ le document CN23 dans la réponse du web service. <br/><br/> La balise\            \ « includeCustomsDeclarations = 1 » est obligatoire pour les envois é\            ligibles à la dématérialisation des documents douaniers (option DDP ou\            \ envoi Outre-Mer). "
        numberOfCopies:
          type: integer
          description: "<i>N</i> <br/>  Nombre de CN23 à imprimer Si la balise n’est pas renseigné\            e 4 exemplaires de CN23 seront imprimés. Le nombre va de 1 compris à 4\            \ exemplaires max. <br/> Remarque : les produits retours internationaux\            \ ne tiennent pas compte de par leur format spécifique de la valeur renseigné\            e ici."
          format: int32
        contents:
          $ref: "#/definitions/Contents"
        importersReference:
          type: string
          description: "<i>AN1…35</i> <br/>  Ré\            férence de l’importateur, Numéro de TVA.<br/><br/> Apparaît sur le fichier\            \ CN23 pour les envois.<br/>N’est pas utilisé pour les retours. "
        importersContact:
          type: string
          description: <i>AN35</i> <br/>  Contact (tél./e-mail) de l’importateur.            <br/> N’apparaît pas sur le fichier CN23.
        officeOrigin:
          type: string
          description: <i>AN35</i> <br/>  Bureau d’origine. <br/> N’apparaît pas sur le            fichier CN23.
        comments:
          type: string
          description: <i>AN35</i> <br/>  Observations<br/>Apparaît sur le fichier CN23
        description:
          type: string
          description: "<i>AN1.. ??</i> <br/>  Description\            \ générique des articles en anglais. <br/> Obligatire dans le cas d’un\            \ envoi DDP <br/> Exemple : Textile items, Shoes, Music instrument, Hair\            \ dryer, etc  "
        invoiceNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Identifiant            du document facture lié.<br/> Apparaît dans le champ « N° de la facture            » sur la CN23.
        licenceNumber:
          type: string
          description: <i>AN1…35</i> <br/>  Identifiant du document de licence d’importation            lié. <br/> Apparaît dans le champ « N° de la/les licences » sur la CN23.
        certificatNumber:
          type: string
          description: <i>AN1…35</i> <br/>  Identifiant du document de certificat lié.            <br/> Apparaît dans le champ « N° du/des certificats » sur la CN23.
        importerAddress:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  Ces paramètres        ne sont obligatoires que pour les destinations nécessitant une déclaration        douanière de type CN23.
    Field:
      required:
      - key
      - value
      type: object
      properties:
        key:
          type: string
          description: <i>A</i> <br/>  Mot            clef à renseigner
        value:
          type: string
          description: <i>AN32</i> <br/>  Valeur attendue dans l'ordre identifié            du SI Colissimo
    Fields:
      type: object
      properties:
        field:
          type: array
          description: "Taille\            \ du colis en centimètres: longueur, largeur et hauteur<br/>\r\nLongueur\            \ <= 274 cm<br/>\r\nLongueur + curconférence (2 x hauteur + 2 x largeur)\            \ <= 330 cm<br/>\r\n               \r\n               <field>\r\n    \            \               <key>LENGTH</key>\r\n                   <value>30</value>\r\            \n               </field>\r\n               <field>\r\n              \            \     <key>WIDTH</key>\r\n                   <value>20</value>\r\n   \            \            </field>\r\n               <field>\r\n                  \            \ <key>HEIGHT</key>\r\n                   <value>10</value>\r\n      \            \         </field>\r\n               \r\n<b>Code barre personnalisé</b><br/>\r\            \nAjouter un code barre personnalisé sur les étiquettes standards GEOLABEL\            \ conf. chapitre \"Option d'envoi/Code barres client\" (maximum 17 caractè\            res alpha numériques et 25 numériques)<br/>\r\n               \r\n   \            \            <field>\r\n                      <key>PRINT_CUSTOMER_BARCODE</key>\r\            \n                      <value>1</value>\r\n               </field>\r\n\            \               <field>\r\n                       <key>CUSTOMER_BARCODE</key>\r\            \n                       <value>REF12345678</value>\r\n              \            \ </field>\r\n\r\nIF PRINT_CUSTOMER_BARCODE = 1, affiche le code barre\            \ avec la valeur du champ CUSTOMER_BARCODE (voir les exemples d'etiquettes)<br/>\r\            \nIF PRINT_CUSTOMER_BARCODE = 2, affiche le code barre avec la valeur\            \ du numéro de colis (voir les exemples d'etiquettes)<br/>\r\n<br/>\r\n\            <br/>\r\n<b>Etiquette avec référence client</b><br/>\r\nSur les étiquettes\            \ standard GEOLABEL au format 10x15 et PDF , il est possible d'ajouter\            \ un texte personnalisé de 15 caractères maximum sous les étiquettes.<br/>\r\            \nLe champ PRINT_CUSTOMER_LABEL permet d'afficher ou non le texte, et\            \ le champ CUSTOMER_LABEL précise le texte.<br/>\r\n    \n           \            \  <field>\r\n                 <key>PRINT_CUSTOMER_LABEL</key>\r\n   \            \              <value>1</value>\r\n             </field>\r\n    \n   \            \ \n             <field>\r\n                 <key>CUSTOMER_LABEL</key>\r\            \n                 <value>ABCDEFG</value>\r\n             </field>\r\n\            \    \n<br/>\r\nRemarque : il n'est pas possible d'afficher en même temps\            \ un code à barre personnalisé et un texte personnalisé<br/>\r\n<br/>\r\            \nRemarque 2 : le texte personnalisé n'apparaîtra pas sur l'étiquette\            \ en cas de réimpression par getlabel (ou sur un automate La Poste).<br/>\r\            \n<br/>\r\n<b>CN23 format</b><br/>\r\nFormats spécifiques pour la CN23\            \ :<br/>\r\n    \n             <field>\r\n                 <key>OUTPUT_PRINT_TYPE_CN23</key>\r\            \n                 <value>ZPL_10x12_203dpi</value>\r\n             </field>\r\            \n    \nFormats possibles :<br/>\r\nZPL_10x12_203dpi<br/>\r\nZPL_10x12_300dpi<br/>\r\            \nDPL_10x12_203dpi<br/>\r\nDPL_10x12_300dpi<br/>\r\nPDF_10x12_300dpi<br/>\r\            \nPDF_A4_300dpi<br/>\r\n<b>une étiquette unique (UL) incluant la CN23\            \ sur la même page</b> <br/>\r\nles formats acceptés sont : <br/>\r\n\            ZPL_10x15_203dpi_UL<br/>\r\nZPL_10x15_300dpi_UL<br/>\r\nDPL_10x15_203dpi_UL<br/>\r\            \nDPL_10x15_300dpi_UL<br/>\r\nPDF_10x15_300dpi_UL<br/>\r\nPDF_A4_300dpi_UL<br/>\r\            \n    \n             <field>\r\n                 <key>OUTPUT_PRINT_TYPE_CN23</key>\r\            \n                 <value>PDF_10x15_300dpi_UL</value>\r\n            \            \ </field>\r\n    \nLe format de la CN23 (output_print_type_CN23) et format\            \ de l'étiquette (outputprinting type) doit être le même pour bénéficier\            \ de la fonctionnalité d'étiquette unifiée: <br/><br/>\r\nSi le colis\            \ n'est pas éligile à la CN23, le format affiché sera<br/>\r\n(OutputFormat\            \ block: outputprinting type field).<br/>\r\nSi il y a plus de 3 articles,\            \ la CN23 affichera que les 3 premiers mais les totaux seront pour l'ensemble\            \ des articles<br/>\r\nCette option écrase les personalisations suivantes\            \ : <br/>\r\n- Ajout d'une étiquette personalisée (PRINT_CUSTOMER_LABEL)<br/>\r\            \n- Ajout d'une référence CAB personalisée (PRINT_CUSTOMER_BARCODE)<br/><br/>\r\            \n<b>Groupage de colis</b><br/>\r\n<br/>\r\n- Les paramètres additionnels\            \ du service sls pour tracer les colis sont les suivants : <br/>\r\n•\t\            Etiquette de traçage du colis<br/>\r\n•\tNombre total de packages<br/>\r\            \n•\tIteration (numéro du package)<br/>\r\n<br/>\r\n<br/>\r\n        \            \       <field>\r\n                  <key>TYPE_MULTI_PARCEL</key>\r\n\            \                  <value>FOLLOWER</value>\r\n               </field>\r\            \n               <field>\r\n                  <key>PARCEL_ITERATION_NUMBER</key>\r\            \n                  <value>2</value>\r\n               </field>\r\n  \            \             <field>\r\n                  <key>TOTAL_NUMBER_PARCEL</key>\r\            \n                  <value>5</value>\r\n               </field>\r\n<br/>\r\            \n- Les paramètres additionnels du service sls pour les colis master sont\            \ les suivants : <br/>\r\n•\tEtiquette du colis master<br/>\r\n•\tNombre\            \ total de packages<br/>\r\n•\tIteration (numéro du package)<br/>\r\n•\            \    Limitation à 5 colis<br/>\r\n•\tListe des packages suivis<br/>\r\n\            \     \r\n     \r\n              <field>\n                   <key>TYPE_MULTI_PARCEL</key>\r\            \n                   <value>MASTER</value>\r\n             </field>\r\n\            \             <field>\r\n                  <key>PARCEL_ITERATION_NUMBER</key>\r\            \n                   <value>2</value>\r\n             </field>\r\n   \            \          <field>\r\n                  <key>TOTAL_NUMBER_PARCEL</key>\r\            \n                   <value>5</value>\r\n             </field>\r\n   \            \          <field>\r\n                  <key>LIST_FOLLOWER_PARCEL</key>\r\            \n\t\t\t\t     <value>8Q53764663714/8Q53764663721/8Q53764663738/8Q53764663748/8Q53764663758</value>\r\            \n             </field>\r\n<br/>\r\n<b>BuyNowPayLater</b><br/>\r\nCette\            \ saisie permet de notifier l'identifiant de la transaction attachée à\            \ un colis Colissimo<br/>\r\noffre payante en paiement différé et fractionné\            .<br/>\r\nCe paramètre id est tronqué à 50 caractères<br/>\r\n    \n \            \            <field>\r\n                 <key>BNPL</key>\r\n         \            \        <value>ID de transaction</value>\r\n             </field>\r\n\            \    \n<b>CUSER_INFO_TEXT</b><br/>\r\nRéférence de recherche pour OSC.\            \ La référence peut être unique ou partagée sur plusieurs colis, afin\            \ de permettre de rechercher une liste de colis ayant la même référence\            \ par exemple.<br/>\r\n    \n             <field>\r\n                \            \ <key>CUSER_INFO_TEXT</key>\r\n                 <value>xxxxxxxxxxxxxxxxxx</value>\r\            \n             </field>\r\n    \n<b>CUSER_INFO_TEXT_4</b><br/>\r\nRéfé\            rence partenaire (si communiquée par vos interlocuteurs Colissimo). Spé\            cifique à l'utilisation du service par nos partenaires.<br/>\r\n    \n\            \             <field>\r\n                 <key>CUSER_INFO_TEXT_4</key>\r\            \n                 <value>xxxxxxxxxxxxxxxxxx</value>\r\n             </field>\r\            \n    \n<br/>\r\n<b>EORI (Economics Operators Registration and Identification)</b><br/>\r\            \n<br/>Numéros EORI de l'expéditeur et/ou du destinataire qui seront visibles\            \ notamment sur la déclaration douanière.\r\n  * Utiliser le champs 'EORI_ADDRESSEE'\            \ pour l'EORI du destinataire\r\n    <br/>\n  * Utiliser le champs 'EORI'\            \ pour l'EORI de l'expéditeur (obligatoire pour les envois vers les US).\r\            \n    \n             <field>\n                <key>EORI</key>\n      \            \          <value>1234567</value>\n             </field>\n           \            \  <field>\n                <key>EORI_ADRESSEE</key>\n               \            \ <value>1234567</value>\n             </field>\n"
          items:
            $ref: "#/definitions/Field"
        customField:
          type: array
          items:
            $ref: "#/definitions/Field"
      description: <i>SUB</i> <br/>  Ce bloc peut être utilisé        pour renseigner l’identifiant <br/><br/> -Gestion des utilisateurs </b> <br/>        -Colissimo Pass ID <br/> - GST <br/> - EORI 
    Letter:
      required:
      - addressee
      - parcel
      - service
      type: object
      properties:
        service:
          $ref: "#/definitions/Service"
        parcel:
          $ref: "#/definitions/ParcelRequestV2"
        customsDeclarations:
          $ref: "#/definitions/CustomsDeclarations"
        sender:
          $ref: "#/definitions/Sender"
        addressee:
          $ref: "#/definitions/Addressee"
        codSenderAddress:
          $ref: "#/definitions/Address"
      description: "<i>SUB</i> <br/>  Ce bloc\        \ contient des balises et blocs liés à l’expédition (options, colis, expé\        diteur, destinataire, douanes).<br/><br/>Liste des sous-blocs (décrits plus\        \ bas) : <br/><ul><li>Service : type de produit et tarifs, </li><li>Parcel\        \ : assurances et options, </li><li>Sender : expéditeur ou déposant en retour\        \ </li><li>Addressee : destinataire,</li><li>CustomsDeclarations : douanes.</li></ul>"
    Original:
      type: object
      properties:
        originalIdent:
          type: string
          description: "<i>A1</i> <br/>  Clé\            \ permettant d’identifier la facture et colis aller liés à l’article.\            \ <br/><br/> Obligatoire pour les produits retours inter (7R) hors UE\            \ et 5R(OM). <br/><br/> Appairer le numéro de colis avec son ordonnancement\            \ :<br/><ul> <li>si l’article appartient au 1er colis, indiquer A ;</li>\            \ <li>si l’article appartient au 3ème colis, indiquer C ;</li> <li>etc\            \ …</li> </ul> "
        originalInvoiceNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Numéro de la facture d’origine            du colis. <br/><br/> Obligatoire pour un colis Retour.
        originalInvoiceDate:
          type: string
          description: <i>AN10</i> <br/>  Date            de la facture d’origine du colis. <br/><br/> Obligatoire pour un colis            Retour. <br/><br/> Format attendu AAAA-MM-JJ. <br/><br/> Doit être antérieure            ou égale à la date du jour.
          format: date-time
        originalParcelNumber:
          type: string
          description: <i>AN1...35</i> <br/>  Numéro de colis d’origine.<br/><br/>Obligatoire            pour un colis Retour. 
      description: Bloc        contenant le (ou les) set(s) de données Original. <br/><br/> Obligatoire pour        les produits retours inter (7R) hors UE et 5R (OM). <br/><br/> Au plus 5 sets        de données Original sont agréés.<br/><br/> Les colis sont identifiés selon        l’ensemble 
    OutputFormat:
      required:
      - outputPrintingType
      - x
      - "y"
      type: object
      properties:
        x:
          type: integer
          description: "<i>N-9999…9999</i> <br/> Par\            \ défaut, mettre à \"false\" (ou \"0\"). <br/>Permet d’ajuster le décalage\            \ horizontal de l’impression sur l’étiquette (exprimé en points): <br/><ul><li>si\            \ x < 0: l'étiquette est décalée à droite.</li><li>si x > 0: l'étiquette\            \ est décalée à gauche.</li></ul>"
          format: int32
        "y":
          type: integer
          description: "<i>N-120…120</i> <br/> Par défaut, mettre\            \ à \"false\" (ou \"0\"). <br/>Permet d’ajuster le décalage vertical de\            \ l’impression sur l’étiquette (exprimé en points) : <br/><ul><li>si y\            \ < 0: l'étiquette est décalée en haut.</li><li>si y > 0: l'étiquette\            \ est décalée en bas.</li></ul>"
          format: int32
        outputPrintingType:
          type: string
          description: <i>L</i> <br/> Format            d'impression des étiquettes.
        dematerialized:
          type: boolean
          description: <i>B</i> <br/> Non            utilisé (utilisation interne à La Poste uniquement)
        returnType:
          type: string
          description: "<i>L</i> <br/> Définit le mode de\            \ transmission de l’étiquette.</b></b> Utilisé pour le Colissimo Retour\            \ uniquement.</b>Par défaut, l’étiquette est envoyée uniquement dans la\            \ réponse du Web Service.</b></b> Valeurs possibles : <br/><ul><li>SendPDFByMail\            \ : l’étiquette est également envoyée par e-mail en tant que pièce jointe\            \ à l’adresse renseignée dans le bloc « sender ».</li> <li>SendPDFLinkByMail\            \ : l’étiquette est également envoyée par e-mail sous forme de lien hypertexte\            \ à l’adresse renseignée dans le bloc « sender ».</li></ul> "
        printCODDocument:
          type: boolean
          description: "<i>B</i> <br/> Permettre d’imprimer le document CRBT\            \ <br/>Par défaut : false"
      description: <i>SUB</i> <br/>  Ce bloc contient        les balises liées au format des éditions renvoyées par le Web Service.
    ParcelRequestV2:
      required:
      - weight
      type: object
      properties:
        parcelNumber:
          type: string
          description: <i>AN13</i> <br/>  Non utilisé (utilisation interne à La Poste uniquement)
        insuranceAmount:
          type: integer
          description: <i>N</i> <br/>  Non            utilisé (utilisation interne à La Poste uniquement)
          format: int32
        insuranceValue:
          type: integer
          description: "<i>N</i> <br/>  Valeur assurée. <br/><br/> Par défaut, renseigner \"\            0\". <br/> Si l’option d’assurance est choisie, renseigner le montant\            \ du niveau d’assurance souhaité parmi les 6 niveaux proposés. Le montant\            \ doit être exprimé en centimes. Exemple : 500000 pour 5000 EUR. <br/><br/>\            \ Si la valeur renseignée ne correspond pas à l’un des 6 niveaux d’assurance,\            \ la valeur affichée sera celle du niveau dans lequel le montant renseigné\            \ se situe. Exemple : 16200 soit 162 EUR, deviendra 30000 EUR soit 300\            \ EUR. <br/><br/>6 niveaux d’assurance optionnelle : <br/> <ul> <li>150\            \ EUR ; </li> <li>300 EUR ; </li> <li>500 EUR ; </li> <li>1000 EUR ; </li>\            \ <li>2000 EUR ; </li> <li>5000 EUR ;</li></ul><br/>Maximum= 5000€."
          format: int32
        recommendationLevel:
          type: string
          description: Niveau
        weight:
          type: number
          description: "<i>N</i> <br/>  Poids du colis en kg. <br/> Exemple : \"5.50\"\            . "
          format: float
        nonMachinable:
          type: boolean
          description: "<i>B</i> <br/>  Format\            \ du colis. <br/> Si la balise productCode a les codes <b>HD</b> renseigner\            \ \"false\" (ou \"0\") par défaut. <br/> Passer à \"true\" (ou \"1\")\            \ pour indiquer que le format du colis est non standard (non mécanisable).\            \ "
        returnReceipt:
          type: boolean
          description: "<i>B</i> <br/>  Avis\            \ de réception. <br/><br/> Par défaut, renseigner \"false \" (ou \"0\"\            ). "
        instructions:
          type: string
          description: "<i>AN1...35</i> <br/>  Permet d’\            afficher sur l’étiquette : <br/> <ul> <li>Des indications complémentaires\            \ pour la livraison,</li> <li>Le motif du retour.</li> </ul>  <br/>  Exemple\            \ pour une livraison : « à gauche au portail intérieur ». "
        pickupLocationId:
          type: string
          description: "<i>N6</i> <br/>  Identifiant du point de\            \ retrait pour une livraison Colissimo hors domicile. <br/><br/> Cette\            \ balise : <br/> <ul> <li>Doit être renseignée si productCode vaut <b>HD</b></li>\            \ <li>Doit être vide si productCode vaut <b>DOM</b> ou <b>DOS.</b></li>\            \ </ul> <br/> Si le code réseau est \"X00\", il sera obligatoire de renseigner\            \ le bloc fields.  "
        ftd:
          type: boolean
          description: "<i>B</i> <br/>  Pour les envois vers l'outre-mer\            \ <br/><br/> Par défaut, renseigner \"false \" (ou \"0\"). <br/><br/>Obligatoire,\            \ à renseigner par \"true \" (ou \"1\"), pour les envois vers l’Outre-Mer\            \ uniquement.   "
        ddp:
          type: boolean
          description: "<i>B</i> <br/>  Pour les\            \ envois vers l’international <br/><br/> Indiquer « 1 » si le colis est\            \ ddp, <br/><br/> Par défaut, renseigner « 0 » (zéro) "
        disabledDeliveryBlockingCode:
          type: string
          description: "Prérequis : avoir activé le service \"Code Bloquant\" sur\            \ la Colissimo Box<br/><br/>Indique si la livraison doit se faire sans\            \ code bloquant. (Si aucune valeur n'est renseignée, les colis éligibles\            \ seront livrés avec code bloquant)<br/><br/>1 = true : Désactive le code\            \ bloquant<br/>0 = False : Ne désactive pas le code bloquant<br/>Vide\            \ = False : Ne désactive pas le code bloquant"
        codamount:
          type: integer
          description: "<i>N</i> <br/>  Montant attendu pour une livraison contre\            \ remboursement.  <br/><br/> Par défaut, renseigner \"false\" (ou \"0\"\            ). <br/><br/> Obligatoire si la valeur de la balise COD est \"true\" (ou\            \ \"1\"). "
          format: int32
        cod:
          type: boolean
          description: "<i>B</i> <br/>  Indique si\            \ la livraison doit se faire contre remboursement. <br/> <br/> Par dé\            faut, renseigner \"0\" (zéro). <br/><br/>  Passer à \"true\" (ou \"1\"\            ) si la livraison doit se faire contre remboursement.  "
        codcurrency:
          type: string
          description: COD devise
      description: <i>SUB</i> <br/>  
    Sender:
      type: object
      properties:
        senderParcelRef:
          type: string
          description: <i>AN1...17</i> <br/>  Référence            de commande de l’expéditeur. <br/> <b>Elle permet d’afficher la référence            client seulement sur l’étiquette.</b><br/>  <b>Cette donnée n’est pas            remontée dans le SI Colissimo et ne sera pas visible dans l'outil de Suivi            Colis.</b>  
        address:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  
    Service:
      required:
      - depositDate
      - productCode
      type: object
      properties:
        productCode:
          type: string
          description: "<i>L</i> <br/>  Code\            \ désignant l’offre produit souhaitée. <br/><br/> Exemple : code <b>CORE</b>\            \ pour Colissimo Retour. <br/><br/>  Si la balise vaut : <ul><li><b>HD</b>\            \ la balise pickupLocationId doit être renseignée,</li> <li><b>DOM</b>\            \ ou <b>DOS</b>, la balise pickupLocationId ne doit pas être renseigné\            e.</li></ul>"
        depositDate:
          type: string
          description: "<i>D</i> <br/>  Date de dépôt prévisionnelle\            \ dans le réseau La Poste. <br/><br/> Exemple : \"2022-06-25\""
          format: date-time
        mailBoxPicking:
          type: boolean
          description: "<i>B</i> <br/>  Demander\            \ la collecte du colis retourné à partir d'une boîte aux lettres (retour\            \ BAL).<br/><br/> Utilisé pour autoriser le retour des colis en boîte\            \ aux lettres. <br/><br/>  Utilisé pour le code <b>CORE (8R)</b><br/>\            \ et <b>CORF (CQ).</b>  <br/><br/>  Par défaut, renseigner \"false\" (ou\            \ \"0\"). <br/><br/> Doit valoir \"true\" (ou \"1\") pour que le colis\            \ retourné par son ancien destinataire puisse être collecté par un agent\            \ de Colissimo à partir de la boîte aux lettres de l’ancien destinataire.\            \ "
        mailBoxPickingDate:
          type: string
          description: "<i>D</i> <br/>  Date d’emport en boîte aux lettres demandée.<br/><br/>\            \ Utilisé pour le code <b>CORE (8R)</b> et <b>CORF (CQ).</b><br/><br/>\            \ Obligatoire (et pris en compte) seulement si mailBoxPicking vaut \"\            true\" (ou \"1\"). <br/><br/> Exemple : 2015-12-23 <br/>  Pour connaî\            tre la prochaine date possible, appeler la méthode getListMailBoxPickingDates\            \ .  "
          format: date-time
        vatCode:
          type: integer
          description: <i>N</i> <br/>  Non            utilisé (utilisation interne à La Poste uniquement)
          format: int32
        vatPercentage:
          type: integer
          description: <i>N</i> <br/>  Non            utilisé (utilisation interne à La Poste uniquement)
          format: int32
        vatAmount:
          type: integer
          description: <i>N</i> <br/>  Non            utilisé (utilisation interne à La Poste uniquement)
          format: int32
        transportationAmount:
          type: integer
          description: "<i>N</i> <br/>  Prix\            \ du transport de base (frais de port) sans les options éventuelles. <br/><br/>\            \ En centièmes d’euro <br/> Exemple : 4530 pour 45,30€. <br/> Par défaut,\            \ passer à \"0\". <br/>  N’apparaît pas dans le formulaire CN23. "
          format: int32
        totalAmount:
          type: integer
          description: "<i>N</i> <br/>  Prix\            \ du transport de base augmenté du prix des options de l’envoi. <br/><br/>Obligatoire\            \ pour les colis nécessitant une déclaration CN23. <br/><br/> En centiè\            mes d’euro.<br/>  Exemple : 4530 pour 45,30€. <br/> Apparaît dans le formulaire\            \ CN23 dans le champ « Frais de port ». "
          format: int32
        orderNumber:
          type: string
          description: <i>AN1…30</i> <br/>  Référence            de commande du client. <br/><br/> <b>N’apparait pas sur l’étiquette mais            est intégré dans le SI Colissimo.</b> <br/> <b>Renvoyée dans les fichiers            de suivi de colis (EDI-Retour).</b> <br/><br/> Peut être utile pour rechercher            des colis selon ce champ dans l'outil de Suivi Colis (apparaît dans le            champ « réf. client »). 
        commercialName:
          type: string
          description: "<i>AN</i> <br/>  Nom\            \ commercial du chargeur.<br/><br/>  Cette balise : <br/> <ul><li><b>Est\            \ obligatoire si productCode vaut HD</b></li><li>Facultative si productCode\            \ vaut <b>DOM, DOS,</b></li></ul> <br/> Ce nom sera affiché dans les notifications\            \ par e-mail faites aux destinataires des colis.  "
        returnTypeChoice:
          type: integer
          description: "<i>L</i> <br/>  Indique si le colis doit être retourné à l’expéditeur\            \ en cas de <span style='text-decoration: underline;text-decoration-style:\            \ double;'>non distribution</span> du colis. <br/><br/> Obligatoire pour\            \ certains colis à l’international selon les zones tarifaires applicables.\            \ "
          format: int32
        reseauPostal:
          type: string
          description: "<i>B</i> <br/>  Ce paramètre permet de choisir\            \ le réseau postal responsable de la livraison (DPD ou réseau postal local)\            \ pour tout envoi de colis à l’international parmi les pays concernés\            \ et sur les produits concernés. <br/><br/> <ul><li><b>reseauPostal =\            \ 0 => Choix DPD</b></li> <li><b>reseauPostal = 1 => Choix réseau postal\            \ local</b></li></ul> <br/><br/> Le code erreur <b>30027</b> s’affiche\            \ lorsqu’un réseau postal (DPD ou réseau postal local) est choisit pour\            \ un produit qui ne comporte par l’option sélectionnée.  "
      description: <i>SUB</i> <br/>  
