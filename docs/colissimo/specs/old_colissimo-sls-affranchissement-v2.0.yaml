    ## Retour sécurisé
    
    
    

    La méthode generateToken permet de générer un code sécurisé pour vos envois retour, en remplacement d'une étiquette classique. Cette solution innovante offre plus de flexibilité en permettant l'édition de l'étiquette au moment du dépôt, sans nécessiter au client de connaître le numéro de colis à l'avance ou de devoir imprimer l'étiquette. Elle permet aussi de réduire la fraude.
  
    <b>Prérequis et activation</b>

    1) Activer le service dans votre Colissimo Box :
    
        * Connectez-vous à votre espace Colissimo Box
    
        * Accédez à l'onglet "Retour"
    
        * Activez l'option "Retour sécurisé par code sécurisé"
    
    2) Vérifier l'éligibilité de vos produits :
    
        * Compatible avec les offres de retour Colissimo en France
    
        * Certains produits peuvent ne pas être éligibles (code erreur 948)
    
    3) Utiliser la méthode Generatetoken pour obtenir le code sécurisé
    
    4) Communication client :

        * Partager le code sécurisé à votre client
    
        * Fournissez des instructions claires sur l'utilisation du code, expliquez le processus de dépôt en bureau de poste, prévenez du délai de validité du code sécurisé (10j)

    5) Gestion des codes :

        * Conservez une trace des codes générés
    
        * Prévoyez une durée de validité des codes
    
    
    
    ## Comment reconstruire le code Aztec (2D)
    
    
    
    
    
    Cette fonctionnalité, permet aux clients le désirant de reconstruire eux-mêmes le code Aztec (Cab2D) au format PNG, en toute autonomie.
    
    
    Cette solution couvre les environnements Windows (avec PowerShell + Zint Barcode Studio) et Linux (via bash + zint CLI) et elle est disponible uniquement sur la version 3.0 du WS SLS
    
    
    
    <b><u>Windows :  </u></b>
    
      * Installer Zint Barcode Studio : https://sourceforge.net/projects/zint 
    
    <b>Étapes pour générer un code Aztec PNG:</b>
    
      <b>1) Préparer le contenu Cab2D</b>
    
    Le contenu Cab2D (cab2dText)  
    
      <b>2) Créer un fichier binaire (avec PowerShell) script :</b>
    
        $escapedInput = 'contenu de cab2dText '  function Convert-ToBinaryBytes
    
        {      param([string]$str)      $regex = [regex] '\x([0-9a-fA-F]
        {2}
    
        )' 
    
        $bytes = New-Object System.Collections.Generic.List[Byte] 
    
        $cursor = 0 
    
        $matches = $regex.Matches($str)      foreach ($match in $matches) {          $start = $match.Index          $length = $match.Length          if ($start -gt $cursor)
        {              $textPart = $str.Substring($cursor, $start - $cursor)              $bytes.AddRange([System.Text.Encoding]::ASCII.GetBytes($textPart))          }
    
    
    
            $hex = $match.Groups[1].Value 
    
            $byte = [Convert]::ToByte($hex, 16) 
    
            $bytes.Add($byte) 
    
            $cursor = $start + $length 
    
        } 
    
        if ($cursor -lt $str.Length)
        {          $remaining = $str.Substring($cursor)          $bytes.AddRange([System.Text.Encoding]::ASCII.GetBytes($remaining))      }
    
    
    
            return $bytes.ToArray() 
    
        } 
    
        $binaryData = Convert-ToBinaryBytes $escapedInput 
    
        [System.IO.File]::WriteAllBytes("cab_data.bin", $binaryData) 
    
        Write-Host "Fichier 'cab_data.bin' généré avec succès."  
    
    <b>3) Générer le PNG avec Zint</b>
    
      * Ouvrir Zint Barcode Studio
    
      * Choisir “Symbology" : Aztec Code
    
      * Importer le fichier "cab_data.bin"
    
      * Sauvegarder l’image
    
    <div align="center">
      <img alt="Response example for a Sand box" src="../images/imageCAB2D.png" width="60%"/>
    </div>
    
    <b><u>Linux</u></b>  
    
      * Installer Zint : sudo apt install zint
    
      * Créer un fichier binaire (cab_data.bin) à partir du contenu avec \x1d, \x1e, etc.
    
    
    <b>script bash: </b>
    
    
        generate_cab.sh  #!/bin/bash 
    
    
    
        content=' 'contenu de cab2dText '  echo -e "${content//x/x}" > cab_data.bin  
    
    
    
      * Rendre le script exécutable et l'exécuter :  
    
    
        chmod +x generate_cab.sh 
    
    
    
        ./generate_cab.sh  
    
    
    
    Cela va créer un fichier cab_data.bin contenant les bons octets binaires. 
    
    
    
     * Générer le PNG avec Zint
    
    
        zint -b 92 -i cab_data.bin -o code_aztec.png  
    
    
    
    -b 92 → Aztec Code 
    
    
    -i → input binaire 
    
    
    -o → nom du fichier image de sortie  Résultat :
    
    
    Une image PNG contenant un code Aztec valide avec les bons caractères de contrôle (GS, RS, EOT, etc.). 
    
    
    
    # Les options d'envoi
    
    
    
    Tous les produits La Poste - Colissimo n'offrent pas les mêmes options d'envoi.
    
    
    
    Le Web Service ne tient compte que des options associées à votre produit, produit renseigné en entrée dans la balise <b>\<productType\></b>.
    
    
    
    Les paragraphes ci-après décrivent certaines de ces options.
    
    
    
    ## Valeur assurée : balise <insuranceValue>:
    
    
    
    L'assurance optionnelle peut aller jusqu'à un montant de 5000 €. Saisir de la balise <b>\<insuranceValue\></b> une valeur en centièmes d'euros (ex : « 4300 » pour 43€). Cette valeur est arrondie à l'entier du niveau le plus proche (ex : arrondie à 150€ si « 4345 » est saisi).
    
    
    
    <b>Compatible sur 6 tranches pour les codes : </b>
    
    
    
    * <b>Nationaux :</b>  DOS (6C), CORE (8R), COL (9V)
    
    
    
    * <b>Outre-Mer :</b> CDS (7Q)
    
    
    
    * <b>Internationaux :</b> DOS (CB, EY, CF), COLI (EY, CF), CORI (7R), CORF (CQ)
    
    
    
    <b>Compatible sur 4 tranches pour les codes : </b>
    
    
    
    * <b>Nationaux :</b> HD
    
    
    
    * <b>Internationaux :</b> HD
    
    
    
