    ## Flux sous dérogation
    
    
    *<i>Prérequis, fonctionnalité disponible uniquement dans la version 3.1 du Web Service SLS</i>


    Colissimo propose une option dédiée à l’envoi de colis contenant des matières dangereuses, dans le cadre d’un flux sous dérogation. Cette fonctionnalité est accessible aux clients ayant souscrit l’option "flux sous dérogation" dans leur contrat.

    Grâce à cette option, vous pouvez :

      * Déclarer la présence de matières dangereuses dans un colis via le Web Service
    
      * Indiquer la catégorie de la matière selon le référentiel réglementaire.
    
      * Activer l’impression du logo "Matière dangereuse" si nécessaire
    
    Cette déclaration permet au système Colissimo d’appliquer automatiquement les règles spécifiques de traitement : tri, acheminement, facturation, etc.
    
    


        <letter>
           <parcel>
             <!-- Champs flux sous dérogation -->
             <hazmatFlag>1</hazmatFlag>
             <hazmatCategory>B</hazmatCategory>
             <!-- Impression du logo "Matières dangereuses" -->
             <hazmatPrintLogo>true</hazmatPrintLogo>
           </parcel>
        </letter>

    
    # Code barres client
    
    
    
    
    Il est possible d'ajouter un code-barres supplémentaire associé à votre référence pour tous les codes produits nationaux, à l'exception de l'offre retour 8R. Ce code-barres sera inclus sur l'étiquette que vous pourrez imprimer en utilisant une imprimante compatible avec les formats PDF et thermique (10x15 ou 10x12). Cette mise à jour concerne les étiquettes conformes aux normes GEOLABEL.
    
    
    Veuillez noter que ce code-barres doit être fourni dans votre requête. Pour garantir une qualité d'impression optimale, il est conseillé de ne pas dépasser 17 caractères alphanumériques et 25 pour un code numérique. Cela permet de maintenir une zone de silence adéquate autour du code-barres, facilitant ainsi sa lecture. Nous vous invitons à bien tester ces références, notamment sur la longueur maximum de vos code barres.
    
    
    
    
    
