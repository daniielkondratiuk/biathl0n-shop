    ## Authentification API
    
    
    Pour accéder aux différentes ressources de notre API, une authentification est requise. Nous utilisons un système d'authentification basé sur des clés de connexion aux Web Services (clé API) afin de sécuriser les échanges et garantir l'identité des utilisateurs. Ces consignes s'appliquent à toutes les méthodes exposées dans cette documentation.    
    
    
    
    <b>Obtention de la clé de connexion aux Web Services</b>
    
    
    Pour obtenir une clé utilisateur, vous devez vous connecter avec vos identifiants (nom d'utilisateur et mot de passe) à la Cbox, puis aller dans l'édition de votre profil. Cette clé peut être renouvelée à tout moment pour vos besoins de sécurité et confidentialité.
    
    
    <b>Utilisation de la clé de connexion aux Web Services</b>
    
    
    Une fois que vous avez obtenu votre clé de connexion, vous devez l'inclure dans le header de toutes vos requêtes.


    Exemple: 


    Dans le header


    	       apikey: 123A123BC1234D12345
    
    
    
    <b>Cas spécifique d'une délégation de droits sur un utilisateur avancé : </b>
    
    
    Pour les logisticiens ou Marketplace, ayant reçu une délégation sur le Web Service, vous devez obtenir le numéro du compte pour lequel vous allez affranchir. Il vous faudra 
    
    * Dans le header renseigner la clé de connexion aux Web Services de votre compte
    
    * Dans les fields renseigner le compte Colissimo pour lequel vous affranchissez
    
    
    
    Exemple: 


    Dans le header


    	       apikey: 123A123BC1234D12345
    
    
    
    Dans les fields
    
    
    	       <field>
                  <key>ACCOUNT_NUMBER</key>
                    <value>100102</value>
               </field>
    
    
    <b>Expiration et renouvellement de la clé de connexion aux Web Services</b>
    
    
    Les clés d'authentification n'ont pas de durée de vie limitée pour le moment. Il est de votre responsabilité de régulièrement mettre à jour votre clé régulièrement via la Cbox.
    
    
    Vous pouvez la mettre à jour en vous connectant avec vos identifiants (nom d'utilisateur et mot de passe) à la Cbox, puis aller dans l'espace d'édition de votre profil, et cliquer sur le bouton "générer" à coté du champ "Clés de connexion aux Web Services".


    La mise à jour est immédiate. Attention, si vous modifiez votre clé de connexion dans l'espace client, vous devez également le modifier dans l'invocation du web service, faute de quoi l'accès au web service sera refusé.
    
    
    <b> Gestion des Erreurs d'Authentification </b>
    
    
    En cas d'erreur d'authentification, l'API renverra un code d'état 30000 avec un message décrivant la nature de l'erreur. Assurez-vous de gérer ces erreurs correctement dans votre application pour offrir une bonne expérience utilisateur. 
    
    
    <b>Bonnes Pratiques</b>
    
    
    * Sécurité : Ne partagez que si nécessaire votre clé de connexion aux Web Services. Traitez-le comme un mot de passe.
    
    
    * Stockage : Stockez votre jeton de manière sécurisée sur le client (par exemple, dans un stockage sécurisé côté client).
    
    
    * Renouvellement : Changez régulièrement votre clé d'authentification. 
    
    
    
    
    
    
    
    
    
    
    
