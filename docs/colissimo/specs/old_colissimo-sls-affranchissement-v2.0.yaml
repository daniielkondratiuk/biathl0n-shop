      summary: getListMailBoxPickingDates
      description: "La\        \ méthode <b>getListMailBoxPickingDates()</b> permet de savoir si une adresse\        \ est éligible à un dépôt de colis retour en boîte aux lettres et de connaî\        tre la date et heure du prochain emport de colis à cette adresse. <br/><br/>\        \ Cette méthode sera utilisée pour valider l’éligibilité de l’adresse géographique\        \ pour un emport en boîte aux lettres le lendemain, ce qui permettra ensuite\        \ de renseigner cette date d’emport dans la balise mailBoxPickingDate du Bloc\        \ Service lors de l’annonce ultérieure de l’expédition au moyen de la méthode\        \ GenerateLabel."
