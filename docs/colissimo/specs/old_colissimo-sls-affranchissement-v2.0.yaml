    ## Le format d'étiquette Geolabel
    
    
    Geolabel est la nouvelle norme commune d'étiquetage, de routage et d'échange de données du Groupe La Poste, afin d'assurer une interopérabilité optimale dans le traitement des colis. La mise en place de cette étiquette unique permettra de multiplier les synergies entre les différentes entités du Groupe, et donc de répondre plus efficacement aux attentes des clients. De par le volume accru d'information qu'elle comporte, l'étiquette Geolabel offre en outre une aide au tri visuel, tout en constituant un outil plus performant. Sans aucune mise à jour à effectuer, votre solution web service d'étiquetage générera automatiquement, et de manière progressive, les étiquettes Geolabel.
    
    
    
    Les étiquettes pour l'étranger peuvent être parfois différentes pour répondre aux outils utilisés par les partenaires de livraison.
    
    
    
    
