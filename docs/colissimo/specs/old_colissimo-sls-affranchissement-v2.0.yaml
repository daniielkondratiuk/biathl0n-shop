    ## Codification des formats
    
    
    
    
    <table width="425">
    <tbody>
    <tr>
    <td width="57">
    <p><strong>Code</strong></p>
    </td>
    <td width="369">
    <p><strong>Description</strong></p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>A</strong></p>
    </td>
    <td width="369">
    <p>Caract&egrave;res alphab&eacute;tiques (sans espace ni symb&ocirc;le de ponctuation)</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>AN</strong></p>
    </td>
    <td width="369">
    <p>Tout caract&egrave;re imprimable</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>N</strong></p>
    </td>
    <td width="369">
    <p>Caract&egrave;res num&eacute;riques d&eacute;cimaux de 0 &agrave; 9</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>D</strong></p>
    </td>
    <td width="369">
    <p>Date</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>T</strong></p>
    </td>
    <td width="369">
    <p>Heure</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>SUB</strong></p>
    </td>
    <td width="369">
    <p>Bloc&nbsp;: liste de balises</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>L</strong></p>
    </td>
    <td width="369">
    <p>Choix parmi une liste de valeurs</p>
    </td>
    </tr>
    <tr>
    <td width="57">
    <p><strong>B</strong></p>
    </td>
    <td width="369">
    <p>Bool&eacute;en (true/false&nbsp;; 1/0)</p>
    </td>
    </tr>
    </tbody>
    </table>
    <p>&nbsp;</p>
    
    
    Les nombres qui suivent ces codes dans la description des données indiquent la longueur du champ. Un seul nombre indique un champ de longueur fixe (ex : « N6 » pour numérique sur 6 caractères), deux nombres séparés par deux caractères point indiquent la longueur minimale et maximale attendue (ex : « AN0..35 » pour alphanumérique pouvant être vide et de longueur maximale 35 caractères).
    
    
    
    
    ## Codification des conditions
    
    
    <table width="585">
    <tbody>
    <tr>
    <td width="56">
    <p><strong>Code</strong></p>
    </td>
    <td width="529">
    <p><strong>Description</strong></p>
    </td>
    </tr>
    <tr>
    <td width="56">
    <p><strong>O</strong></p>
    </td>
    <td width="529">
    <p>Donn&eacute;e obligatoire. Cette donn&eacute;e doit &ecirc;tre syst&eacute;matiquement pr&eacute;sente dans le fichier</p>
    </td>
    </tr>
    <tr>
    <td width="56">
    <p><strong>F</strong></p>
    </td>
    <td width="529">
    <p>Donn&eacute;e facultative. Cette information pourra &ecirc;tre fournie si elle est pr&eacute;sente dans le syst&egrave;me d&rsquo;information &eacute;metteur du fichier.</p>
    </td>
    </tr>
    <tr>
    <td width="56">
    <p><strong>C</strong></p>
    </td>
    <td width="529">
    <p>Pr&eacute;sence conditionn&eacute;e par le contenu d&rsquo;une autre balise du m&ecirc;me enregistrement. Exemple&nbsp;: un colis pour lequel est demand&eacute;e une notification au destinataire devra indiquer les &eacute;l&eacute;ments permettant de transmettre cette notification (num&eacute;ro de t&eacute;l&eacute;phone et/ou adresse mail selon le cas).</p>
    </td>
    </tr>
    </tbody>
    </table>
    <p>&nbsp;</p>
    
    
    # Contact
    
    La Poste - Colissimo met à votre disposition un support, que nous vous invitons à contacter.
    
    
    
    <b>Support en ligne:</b>  <a href="https://www.colissimo.fr/entreprise/mes-demandes/#/home" >Mes Demandes (colissimo.fr)</a>


    <b>Contact téléphonique</b> : <b>02 41 74 20 88 </b>



    Du lundi au vendredi (hors jours fériés) de 8h à 18h



     Le support est là pour répondre à vos questions : 


    * Aide au déploiement de la solution technique au sein de votre entreprise
    
    
    * Assistance en cas de dysfonctionnement ou de difficultés après intégration de la solution technique
    
    
    * Accompagnement en cas de panne, d’anomalie ou d’incident sur les applications de votre espace client (l'Outil de Suivi Colis, ColiShip, Retour Colissimo).
    
    
    Un numéro de dossier vous sera communiqué par le Support Solutions Client lorsque la demande sera prise en compte.
