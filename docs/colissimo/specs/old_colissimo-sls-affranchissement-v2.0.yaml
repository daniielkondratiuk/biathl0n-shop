    ## Contre-remboursement : balises <COD> et <CODAmount>
    
    
    
     * Si la livraison doit se faire contre un paiement du destinataire, passer la balise <b>\<COD\></b> à "true" (ou "1") et renseigner le montant en question au niveau de la balise <b>\<CODAmount\></b> en centièmes d'euros (ex : « 4340 » pour 43,40€).
    
     * Pas d’option CRBT pour les produits Grand-Public OnLine
    
    
    <b>Compatible avec les codes DOS (France Métropolitaine uniquement) et COL</b>.
    
    
    Option non disponible pour les logisticiens
    
    
    ## Avis de réception : balise <returnReceipt>
    
    
    
     * Pour être informé par courrier de la réception et de la date de remise du colis au destinataire, passer la balise <b>"returnReceipt"</b> à "true" (ou "1").
    
    
     * Pas d’option Avis de Réception pour les produits Grand-Public OnLine
    
    
    
    
    ## Envoi non standard : balise <nonMachinable>
    
    
    
    Pour signaler un envoi dit « volumineux » ou non stable.
    
    
    ## Code bloquant
    
    
    Cette option vous permet de désactiver le code bloquant lors de la livraison de votre colis.
    
    
    ## Delivery Duty Paid  : paramètre « ddp » :
    
    
    
    ## DDP OM et International
    
    
    
    Colissimo propose à ses clients chargeurs l'offre DDP qui lui permet de prendre en charge les droits de douanes en cas de taxation des colis envoyés à l'international et l'outre-mer.

    Règles de gestion DDP pour l'international

     * Renseigner le flag « ddp » à « true » en entrée du WS SLS

     * Le pays de destination et le produit doivent être éligibles à l‘offre DDP, sinon le WS SLS retournera l'erreur 30328

     * Le code de l'état ou de la province du destinataire est obligatoire pour les colis à destination des Etats-Unis et du Canada. Selon le paramétrage PERSEUS PAYS (PAYS -> Options -> CTRL CP FEDEX) un contrôle de cohérence entre le code postal et le code état ou province est effectué. S'il n'y a pas cohérence le WS SLS retournera le message d'erreur 30224

     * Renseigner correctement les dimensions du colis (longueur, largeur, hauteur). Elles sont obligatoires sinon le WS SLS retournera les erreurs 30329, 30330, 30331, 30332 30333, 30334 ou 30335.

     * Renseigner le téléphone destinataire sinon le WS SLS retournera l'erreur 30220

     * Renseigner la description générique des articles (param : CustomsDeclarations->description). Le texte doit être en anglais. Elle est obligatoire sinon le WS SLS retournera l'erreur 30557

    Règles de gestion DDP pour l'outre-mer (anciennement Franc de taxes et de droits FTD)

     * Renseigner le flag "ftd" à "true" en entrée du WS SLS

     * Disponible pour la Guadeloupe, Martinique, Mayotte, Réunion et Guyane (zone OM1, hors Saint-Pierre-et-Miquelon et Mayotte)

     * Pas d’option "FTD" pour les produits Grand-Public OnLine

     * Compatible avec le code CDS
    
    
    
            
    
