    <b>Balise <value> :</b>
    
    
    
    * Il affiche la valeur unitaire des articles en EURO (à noter que la somme totale des produits doit être supérieur ou égal à 1)
    
    
    
    * Seulement 2 décimales différentes de 0 sont acceptées.
    
    
    
    Dans le cas où les données nécessaires à la création de la CN23 sont fournies à La Poste - Colissimo, ce document peut vous être retourné dans la réponse de la méthode <b>generateLabel</b> (balise <b><cn23></b>), en 4 exemplaires, sous forme d'un seul fichier PDF (quel que soit le mode d'impression de l'étiquette colis demandé).
    
    
    
    <b>Balise <hsCode> :</b>
    
    
    
    En 1988, après nombre d'États dans le monde, la Communauté européenne a adopté le <b>Système Harmonisé</b> (SH) de désignation des marchandises pour les envois commerciaux. Ce “numéro tarifaire” (qui peut compter 6, 8 ou 10 chiffres) permet d'identifier, de manière unique et dans le monde entier, tous les objets physiques. Il est l'un des trois éléments permettant d'établir la taxation en douane avec le montant des frais de port et l'origine de la marchandise.
    
    
    
    Pour permettre un traitement rapide des opérations douanières à l'arrivée dans le pays de destination, il est ainsi recommandé aux entreprises d'indiquer le numéro tarifaire de la marchandise envoyée. Dans les échanges postaux, seule l'indication du numéro tarifaire à 6 chiffres constitue une obligation pour les entreprises expéditrices. 
    
    
    
    <b>Où se procurer le numéro tarifaire ?</b>
    
    
    
    * Se rapprocher des cellules de douane de sa région pour des envois réguliers.
    
    
    
    * Se rendre sur le site de la douane française : http://ec.europa.eu/taxation_customs/dds2/taric/taric_consultation.jsp?Lang=fr 
    
    
    
    ## EORI (Economics Operators Registration and Identification)
    
    
    
    Tout professionnel communautaire (UE) souhaitant réaliser des envois en dehors de l'UE, devra déposer une demande d'identification pour récupérer son numéro EORI. Ce numéro communautaire unique vise à sécuriser les échanges commerciaux entrant et sortant de l'UE.
    
    
    
    * Utiliser le champs 'EORI_ADDRESSEE' pour l'EORI du destinataire
    
    * Utiliser le champs 'EORI' pour l'EORI de l'expéditeur
    
    * Les deux numéros EORI qui s'afficheront sur la CN23 
    
    
    
            <field>
            <key>EORI</key>
            <value>xxxxxxxxxxxxxxxxxx</value>
            </field>
    
    
    <div align="center">
      <img alt="Declaration with the GST" src="../images/Image15.png" style="width:800px;" />
    </div>
    
    
    
    
    ## GST (Identifiant taxe australienne)
    
    
    
    Tout professionnel du commerce souhaitant commercer vers l'Australie devra effectuer une demande d'identification pour récupérer son GST registration. Dans ce cas, la société exportatrice vers l'Australie, devra s 'acquitter de la GST qu'elle doit directement auprès de l'administration fiscale australienne.
    
    
    
    
            <field>
            <key>GST</key>
            <value>xxxxxxxxxxxxxxxxxx</value>
            </field> 
    
    
    <div align="center">
      <img alt="Declaration with the GST" src="../images/Image14.png" style="width:800px;" />
    </div>
    
    
    
    
    
    
    
    
    
    ## Retour OM
    
    
    
    La Poste - Colissimo ouvre les retours colis pour les OM avec :
    
    
    
    * le nouveau code traffic « 5R », grâce au productCode « CORI »,
    
    
    
    * le code traffic déjà connu « 8R », grâce au productCode « CORE »
    
    
    
    Le web service permet l'impression de l'étiquette retour et de la CN23.
    
    
    
    ## Sens des retours OM autorisés
    
    
    Le retour OM n'est autorisé que dans ces sens :
    
    
    
    * OM vers OM pour inter-dom seulement,
    
    
    
    * France Métropolitaine, Monaco et Andorre vers OM,
    
    
    
    * OM vers France Métropolitaine, Monaco et Andorre.
    
    
    
    
