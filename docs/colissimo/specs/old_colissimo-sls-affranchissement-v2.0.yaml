    <i>
    (*) Les codes « COLD » et « COL » sont associés aux étiquettes antérieures 9L et 9V. Un contrat signé à partir de 2016 met en œuvre les codes « DOM » et « DOS », lesquels sont associés respectivement aux étiquettes 6A et 6C, qui offrent un service équivalent.
    
    
    (**) Le code "HD" peut être appliqué pour toutes les livraisons Hors domicile et tous types de sites de livraison, qu'ils soient nationaux "BPR", "ACP", "CDI", "A2P" ou internationaux "PCS", "BPD ", "CMT". Le code "HD" est un code générique d'affichage remplaçant les anciens codes A2P, BPR, CMT, PCS, BDP et CMT, toujours maintenus "COLI" <productCode> n'est pas à utiliser par de nouveaux clients. Pour tous les envois de colis internationaux avec signature, veuillez utiliser le DOS <productCode>. Le WS renverra automatiquement le code approprié en fonction du réseau du pays auquel appartient le pays de destination.


    (***) La liste des pays éligibles à l'offre Colissimo Domicile et Point Retrait à l'international est consultable via ce lien : 

    https://www.colissimo.entreprise.laposte.fr/fr/international


    (****).Le code traffic associé aux retours OM entre la Guadeloupe et la Martinique sera 8R et celui associé aux retours OM, entre les autres régions OM et la France, sera 5R. Voir chapitre III. 5 Envois internationaux ou vers l'Outre-Mer
    </i>


    (*****) Le <productCode> COLI n'est pas à utiliser, il s'agit d'un code historique. Pour tout envoi de colis à l'international avec signature, veuillez utiliser le <productCode> DOS. Le WS retournera automatiquement le code adapté en fonction du réseau de pays auquel appartient le pays de destination.
    
    
    
    
