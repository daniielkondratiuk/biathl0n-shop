      summary: generateLabel
      description: "Cette méthode est\        \ proposée pour créer les expéditions relevant des offres suivantes, quels\        \ que soient le produit ou la destination associés :<ul><li>Offre France :\        \ Colissimo Domicile, Point Retrait, Retour,</li><li>Offre Internationale\        \ : Colissimo Expert, Domicile, Point Retrait, Retour,</li><li>Offre Outre-Mer\        \ : Colissimo Domicile et Colissimo Eco.</li></ul><b>Remarque</b> : il est\        \ recommandé de ne pas envoyer un champ facultatif plutôt que de l’envoyer\        \ vide. <br/><br/><hr /> Fonction principale d'affranchissement : <br/> Gé\        n&egrave;re une annonce informatique du colis et ses documents associés(é\        tiquette et déclarations douani&egrave;res)<br/><b>Réponse:</b> <br/>Ce service\        \ retourne une Map contenant un objet json et 0 à 3 tableaux d'octets. <br\        \ />La Map retournée est un objet MultipartBody. <br/>L'objet json est sauvegardé\        \ avec la clé \"jsonInfos\" et est de type \"application-json\". <br/>Les\        \ trois tableaux d'octets sont chacun sauvegardé avec les clés : <i>proforma,\        \ label et cn23</i>, et sont de type \"application/octet-stream\".<br /><hr\        \ /><b>Exemple de client en cxf :</b> <br/><br/><i>WebClient client = WebClient.create(URL);<br/>client.type(\"\        application/json\").accept(\"multipart/mixed\");<br/>MultipartBody bodyResponse\        \ = client.post(ObjetJsonRequete, MultipartBody.class);<br /><br/>A ce niveau,\        \ chaque objet sauvegardé dans la Map MultipartBody est récupéré grace &agrave\        \ sa clé.<br/>Pour le tableau d'octets \"label\", on utilise le code ci-dessous:\        \ <br/><br/>DataHandler dataHandler = bodyResponse.getAttachment(\"label\"\        ).getDataHandler();<br/>InputStream is = dataHandler.getInputStream(); </i><hr/>L'objet\        \ jsonInfos a le format ci-dessous: <br/>{<br/>&nbsp;&nbsp;\"messages\":Array[Message],<br/>&nbsp;&nbsp;\"\        parcelNumber\":String,<br/>&nbsp;&nbsp;\"parcelNumberPartner\":String<br/>}<br/><br/>Message<br/>{<br/>&nbsp;&nbsp;\"\        id\":String,<br/>&nbsp;&nbsp;\"type\":String,<br/>&nbsp;&nbsp;\"messageContent\"\        :String<br/>}"
      operationId: generateLabel_1
