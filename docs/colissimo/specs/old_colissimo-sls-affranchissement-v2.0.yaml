  /planPickup:
    post:
      tags:
      - "Description et exemples des méthodes du WS SLS"
      summary: planPickup
      description: "La méthode <b>planPickup()</b>\        \ permet de faire une demande d’emport d’un colis retour déposé par l’expé\        diteur dans sa boîte aux lettres.<br/> Le colis doit avoir été préalablement\        \ annoncé auprès de La Poste. <br/> Cette méthode sera utilisée pour confirmer\        \ de manière ferme l’emport à la date voulue, après avoir annoncé en premier\        \ lieu l’expédition au moyen de la méthode GenerateLabel. <br/> Cette méthode\        \ est compatible avec le code produit CORE (8R Colissimo Retour France) et\        \ CORF (CQ Colissimo Retour International)"
      operationId: planPickup_1
      parameters:
      - name: apiKey
        in: header
        description: L'apiKey 
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/definitions/PlanPickupRequest"
      responses:
        "200":
          description: Traitement OK
          content:
            application/json:
              schema:
                $ref: "#/definitions/PlanPickupResponse"
definitions:
  
    Address:
      required:
      - countryCode
      - zipCode
      type: object
      properties:
        companyName:
          type: string
          description: "<i>AN35</i> <br/>  Raison sociale. <br/><br/>Pour un affranchissement\            \ retour (code produit CORE 8R, CORI 7R ou 5R), la raison sociale est\            \ obligatoire pour le destinataire"
        lastName:
          type: string
          description: <i>A1...35</i> <br/>  Nom.<br/><br/>Obligatoire            pour envoyer un colis sauf si le code postal est un code cedex
        firstName:
          type: string
          description: <i>A1...29</i> <br/>  Prénom.<br/><br/>Obligatoire            pour un envoi hors domicile (code produit HD)
        line0:
          type: string
          description: "<i>AN1...35</i> <br/>  Etage,\            \ couloir, escalier, appart."
        line1:
          type: string
          description: "<i>AN1...35</i> <br/>  Entré\            e, bâtiment, immeuble, résidence."
        line2:
          type: string
          description: "<i>AN1...35</i> <br/>  Numéro et libellé de voie.<br/><br/> Exemple : « 5 rue du Bellay\            \ »<br/><br/>doit comporter impérativement au moins un caractère"
        line3:
          type: string
          description: "<i>AN1...35</i> <br/>  Lieu\            \ dit ou autre mention."
        countryCode:
          type: string
          description: "<i>A2</i> <br/>  Code ISO du pays sur 2 lettres.<br/><br/>Ex\            \ : « FR » pour la France "
        city:
          type: string
          description: "<i>AN1...35</i> <br/>  Ville.<br/><br/>\            \ Peut être laissée vide (ou aussi bien renseignée par une chaîne quelconque,\            \ éventuellement non appropriée) si la balise zipCode est renseignée par\            \ un code Cedex. * "
        zipCode:
          type: string
          description: "<i>AN5</i> <br/>  Code postal.<br/><br/>\            \ Si le code postal correspond à un code Cedex alors :<br/> <ul> <li>la\            \ balise line2 peut être laissée vide,</li> <li>la balise city peut ê\            tre laissée vide.</li></ul><br/>"
        phoneNumber:
          type: string
          description: <i>AN10...12</i> <br/> Numéro            de téléphone.
        mobileNumber:
          type: string
          description: "<i>AN</i> <br/> Le\            \ numéro de portable est fortement recommandé pour améliorer les chances\            \ de livraison au destinataire (il est notamment utilisé pour l'envoi\            \ des notifications de suivi par SMS).<br/>Contrôles effectués :<ul><li>15\            \ caractères maximum</li><li>Pour les envois vers la Belgique, le format\            \ doit être exactement : +324NNNNNNNN</li></ul>Il doit être renseigné\            \ obligatoirement pour les colis suivants :<ul><li>Colis hors domicile\            \ (productCode=HD) nationaux</li><li>Colis avec l'option DDP</li><li>Colis\            \ vers les US</li></ul><br/><br/>Pour tout envoi à l'international, il\            \ est nécessaire d’utiliser le préfixe téléphonique spécifique au pays\            \ dans lequel se trouve votre destinataire."
        doorCode1:
          type: string
          description: <i>AN1...8</i> <br/>  Code porte 1.<br/><br/>N’apparaît pas sur            la CN23.
        doorCode2:
          type: string
          description: <i>AN1...8</i> <br/>  Code porte 2.<br/><br/>N’apparaît pas sur            la CN23.
        intercom:
          type: string
          description: <i>AN1...30</i> <br/>  Interphone.<br/><br/>N’apparaît pas            sur la CN23.
        email:
          type: string
          description: "<i>AN5...80</i> <br/>  Obligatoire\            \ pour les envois hors domiciles <br/><br/> Adresse courriel.<br/><br/>Utilisé\            \ pour les notifications de suivi à l’expéditeur.<br/><br/>Forme attendue\            \ : Texte@Texte.Texte  "
        language:
          type: string
          description: "<i>A2</i> <br/>  Langue\            \ du mail de notification à l’expéditeur.<br/><br/> Utilisée pour les\            \ retours de colis avec le code produit <b>CORI</b> (7R) si la balise\            \ returnType est renseignée. <br/><br/> Utilisée pour les notifications\            \ de suivi par email ou SMS.<br/>Par défaut : FR <br/><br/> Langues disponibles\            \ : ES, IT, NL, EN, DE. "
        stateOrProvinceCode:
          type: string
          description: <i>AN2</i> <br/>  Code de l'état ou de la province. Obligatoire            pour les Etats Unis.
      description: <i>SUB</i> <br/>  
    Addressee:
      required:
      - address
      type: object
      properties:
        addresseeParcelRef:
          type: string
          description: <i>AN1...15</i> <br/>  Référence de commande            du destinataire <br/> Elle permet d'afficher la référence destinataire            seulement sur l'étiquette. Cette donnée n'est pas remontée dans le SI            Colissimo et ne sera pas visible dans OSC. Sa taille ne doit pas excéder            15.
        codeBarForReference:
          type: boolean
          description: "<i>B</i> <br/>  Par défaut, renseigner \"false \" (ou \"0\")."
        serviceInfo:
          type: string
          description: "<i>AN</i> <br/>  "
        promotionCode:
          type: string
          description: <i>AN</i> <br/>  Non utilisé (usage interne à la poste uniquement)
        address:
          $ref: "#/definitions/Address"
      description: <i>SUB</i> <br/>  
    Article:
      required:
      - description
      - quantity
      - value
      - weight
      type: object
      properties:
        description:
          type: string
          description: <i>AN1…64</i> <br/>  Description détaillée de l’article.            <br/> Apparaît sur le fichier CN23. <br/>Obligatoirement en anglais pour            les US et pour les envois avec l'option DDP
        quantity:
          type: integer
          description: <i>N</i> <br/>  Nombre d’articles de ce type. <br/>            Apparaît sur le fichier CN23. 
          format: int32
        weight:
          type: number
          description: <i>N</i> <br/>  Poids net unitaire des articles            en kg. <br/> Apparaît sur le fichier CN23. 
          format: float
        value:
          type: number
          description: <i>N</i> <br/>  Valeur unitaire des articles en EURO. <br/>            Apparaît sur le fichier CN23.
          format: float
        hsCode:
          type: string
          description: "<i>N6, N8 ou N10</i> <br/>  Numéro tarifaire correspondant à l’article. <br/><br/>\            \ Il faudra indiquer 6, 8 ou 10 chiffres pour les envois à l’international\            \ nécessitant une déclaration douani&egrave;re.  <br/> Un code erreur\            \ 30519 apparaîtra dans la réponse du Web Service si la balise est mal\            \ renseignée. <br/><br/> Obligatoire si category vaut 3 (envoi commercial).\            \ <br/><br/> Obligatoire pour les produits retours 7R et 5R. Il doit ê\            tre de taille 6 ou 11 <br/><br/> Apparaît sur le fichier CN23. "
        originCountry:
          type: string
          description: "<i>A2</i> <br/>  Code ISO\            \ du pays d’origine de l’article. <br/><br/> Obligatoire pour les produits\            \ retours 7R et 5R. Il doit être identique pour tous les articles déclaré\            s <br/><br/>  Obligatoire si category=3 (envoi commercial) <br/><br/>\            \ Le nom du pays apparait en entier sur le fichier CN23. <br/><br/> Si\            \ non vide, vérifier que le code pays est sur A2 sinon mettre FR par dé\            faut.  <br/><br/> Si le code pays est différent du format A2, le WS sls\            \ retournera une erreur"
        originCountryLabel:
          type: string
          description: Libellé
        currency:
          type: string
          description: "<i>AN3</i> <br/>  Devise. <br/><br/>Fixé\            \ par défaut en EUR si vide<br/><br/>Obligatoire pour les produits de\            \ retour 7R et 5R.<br/><br/>La devise doit être la même pour tous les\            \ articles déclarés. Elle doit appartenir à la liste {USD, EUR, CHF, GBP,\            \ CNY, JPY, CAD, AUD}. Si la devise est différente de la liste ci-dessus,\            \ le service web renverra une erreur."
        artref:
          type: string
          description: "<i>AN1...35</i> <br/>  Référence\            \ de l’article, numéro de s&eacute;rie. <br/><br/> Obligatoire pour les\            \ produits retours inter (7R) hors UE et 5R (OM)."
        originalIdent:
          type: string
          description: "<i>A1</i> <br/>  Clé permettant d’identifier la facture\            \ aller et le colis lié à l’article. <br/><br/> Obligatoire pour les produits\            \ retours inter (7R) hors UE et 5R(OM). <br/> Appairer le numéro de colis\            \ avec son ordonnancement : <br/> <ul> <li>si l’article appartient au\            \ 1er colis, indiquer A ;</li> <li>si l’article appartient au 3ème colis,\            \ indiquer C ;</li> <li>etc …</li> </ul> "
        vatAmount:
          type: number
          description: <i>N</i> <br/>  TVA des articles
          format: float
        customsFees:
          type: number
          description: <i>N</i> <br/>  Droits            Douane des articles
          format: float
      description: <i>SUB</i> <br/>  Le bloc article peut être répété jusqu’à 100 fois.
    Category:
      type: object
      properties:
        value:
          type: integer
          description: <i>N1</i> <br/>  Nature de l'envoi. <br/>Obligatoire            pour les produits soumis à la CN23.
          format: int32
      description: <i>SUB</i> <br/>  Bloc contenant la balise liée à la nature de l’envoi. <br/><br/>        Obligatoire pour les produits soumis à la CN23.
    CheckGenerateLabelRequest:
      required:
